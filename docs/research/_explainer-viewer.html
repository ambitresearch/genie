<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claude Design explainer — zoomable</title>
<style>
  :root{--bone:#faf8f5;--cream:#f3f0ea;--ink:#171614;--clay:#c87c5e;--clay-deep:#ac5a40;--line:#dad7d2;--muted:#75716d}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#e9e5df;font-family:Inter,system-ui,sans-serif;overflow:hidden}
  /* toolbar */
  .bar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;align-items:center;
       background:var(--bone);border:1px solid var(--line);border-radius:12px;padding:7px 10px;box-shadow:0 6px 22px rgba(40,28,20,.16)}
  .bar button{font-family:Inter,sans-serif;font-weight:600;font-size:14px;width:34px;height:34px;border-radius:8px;border:1px solid var(--line);
       background:#fff;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
  .bar button:hover{border-color:var(--muted);background:var(--cream)}
  .bar button.wide{width:auto;padding:0 12px;font-size:12.5px}
  .bar .zlabel{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;color:var(--muted);min-width:48px;text-align:center}
  .bar .sep{width:1px;height:22px;background:var(--line);margin:0 3px}
  .bar .accent{background:linear-gradient(135deg,#c87c5e,#ac5a40);color:#fff;border-color:var(--clay-deep)}
  .hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;font-family:'JetBrains Mono',monospace;font-size:11px;
        color:var(--muted);background:rgba(250,248,245,.9);padding:6px 12px;border-radius:8px;border:1px solid var(--line)}
  /* stage */
  #stage{position:absolute;inset:0;cursor:grab;overflow:hidden}
  #stage.drag{cursor:grabbing}
  #canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #canvas svg{display:block;width:1400px;height:2480px;box-shadow:0 10px 50px rgba(40,28,20,.25);border-radius:8px;background:#f3f0ea}
  #err{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'JetBrains Mono',monospace;font-size:13px;color:#b0392b;display:none}
</style></head>
<body>
<div class="bar">
  <button id="out" title="Zoom out (−)">−</button>
  <span class="zlabel" id="z">100%</span>
  <button id="in" title="Zoom in (+)">+</button>
  <span class="sep"></span>
  <button class="wide" id="fit" title="Fit to width">Fit</button>
  <button class="wide" id="reset" title="Actual size (100%)">1:1</button>
  <span class="sep"></span>
  <button class="wide accent" id="pop" title="Open raw SVG in a new browser tab">↗ Browser</button>
</div>
<div class="hint">scroll = zoom · drag = pan · double-click = zoom in · ⌘/Ctrl-scroll also zooms</div>

<div id="stage">
  <div id="canvas"></div>
  <div id="err">Could not load SVG — click ↗ Browser to open it directly.</div>
</div>

<script>
const W=1400, H=2480;                 // native SVG size
const stage=document.getElementById('stage');
const canvas=document.getElementById('canvas');
const zlabel=document.getElementById('z');
let scale=1, tx=0, ty=0;

function apply(){ canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; zlabel.textContent=Math.round(scale*100)+'%'; }
function clampScale(s){ return Math.min(6, Math.max(0.15, s)); }

function fit(){
  const pad=70;
  const s=(stage.clientWidth-pad)/W;
  scale=clampScale(s);
  tx=(stage.clientWidth - W*scale)/2;
  ty=Math.max(80,(stage.clientHeight - H*scale)/2);
  if(H*scale>stage.clientHeight-100) ty=90;
  apply();
}
function actual(){ scale=1; tx=(stage.clientWidth-W)/2; ty=90; apply(); }

// zoom toward a screen point
function zoomAt(cx,cy,factor){
  const ns=clampScale(scale*factor);
  const k=ns/scale;
  tx = cx - (cx-tx)*k;
  ty = cy - (cy-ty)*k;
  scale=ns; apply();
}

document.getElementById('in').onclick =()=>zoomAt(stage.clientWidth/2,stage.clientHeight/2,1.25);
document.getElementById('out').onclick=()=>zoomAt(stage.clientWidth/2,stage.clientHeight/2,1/1.25);
document.getElementById('fit').onclick=fit;
document.getElementById('reset').onclick=actual;
document.getElementById('pop').onclick=()=>window.open('how-claude-design-works.svg','_blank');

// scroll to zoom (and ctrl/cmd-scroll), shift+scroll could pan but keep simple
stage.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const r=stage.getBoundingClientRect();
  zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY<0?1.12:1/1.12);
},{passive:false});

// drag to pan
let dragging=false, sx=0, sy=0;
stage.addEventListener('mousedown',(e)=>{dragging=true;stage.classList.add('drag');sx=e.clientX-tx;sy=e.clientY-ty;});
window.addEventListener('mousemove',(e)=>{if(!dragging)return;tx=e.clientX-sx;ty=e.clientY-sy;apply();});
window.addEventListener('mouseup',()=>{dragging=false;stage.classList.remove('drag');});
stage.addEventListener('dblclick',(e)=>{const r=stage.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,1.5);});

// keyboard
window.addEventListener('keydown',(e)=>{
  if(e.key==='+'||e.key==='=')zoomAt(stage.clientWidth/2,stage.clientHeight/2,1.25);
  if(e.key==='-')zoomAt(stage.clientWidth/2,stage.clientHeight/2,1/1.25);
  if(e.key==='0')fit();
});

// fetch + inline the SVG so it always renders (an <img> can silently fail in some embed sandboxes)
fetch('how-claude-design-works.svg?v='+Date.now())
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.text(); })
  .then(txt=>{
    canvas.innerHTML=txt;
    const svg=canvas.querySelector('svg');
    if(svg){ svg.setAttribute('width',W); svg.setAttribute('height',H); svg.style.width=W+'px'; svg.style.height=H+'px'; }
    fit();
  })
  .catch(()=>{ document.getElementById('err').style.display='block'; });
window.addEventListener('resize',()=>{ apply(); });
</script>
</body></html>
