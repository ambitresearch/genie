<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1500" viewBox="0 0 1280 1500" font-family="Inter, system-ui, sans-serif">
<!-- Hallmark · genie (hybrid·clay) · genre: editorial-modern · pre-emit critique: P5 H5 E5 S5 R5 V5
     Reference — THE @genie COMPONENT. genie's atomic unit dissected: anatomy + marker +
     4 validation states + light/dark. Claude-aligned clay palette. -->
  <defs>
    <linearGradient id="lampD" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c87c5e"/><stop offset="1" stop-color="#ac5a40"/></linearGradient>
    <linearGradient id="clayD" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d9916e"/><stop offset="0.5" stop-color="#c87c5e"/><stop offset="1" stop-color="#b8674e"/></linearGradient>
    <filter id="softD" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#171614" flood-opacity="0.12"/></filter>
    <filter id="clayGlowD" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="10" flood-color="#c87c5e" flood-opacity="0.40"/></filter>
    <filter id="softDk" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/></filter>
    <pattern id="checkerD" width="16" height="16" patternUnits="userSpaceOnUse"><rect width="16" height="16" fill="#eae6df"/><rect width="8" height="8" fill="#f3f0ea"/><rect x="8" y="8" width="8" height="8" fill="#f3f0ea"/></pattern>
  </defs>

  <rect width="1280" height="1500" fill="#faf8f5"/>

  <!-- masthead -->
  <g transform="translate(64,56)">
    <rect width="34" height="34" rx="9" fill="url(#lampD)" filter="url(#softD)"/>
    <path d="M9 24 q8 -10 16 0 M17 10 v-5" stroke="#faf8f5" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="17" cy="8" r="2.1" fill="#faf8f5"/>
    <text x="50" y="18" font-family="Newsreader, Georgia, serif" font-size="30" font-weight="600" letter-spacing="-0.015em" fill="#171614">genie</text>
    <text x="50" y="41" font-family="JetBrains Mono, monospace" font-size="13" fill="#75716d">design system · the @genie component (reference) · v1.0</text>
  </g>
  <text x="1216" y="60" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#75716d">the atomic unit · one component → one card</text>
  <line x1="64" y1="104" x2="1216" y2="104" stroke="#dad7d2"/>

  <!-- ── ANATOMY ── -->
  <g transform="translate(64,136)"><text font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="0.06em" fill="#75716d">ANATOMY</text></g>
  <g transform="translate(96,180)">
    <rect width="520" height="320" rx="14" fill="#f3f0ea" stroke="#dad7d2" filter="url(#softD)"/><line x1="16" y1="1" x2="504" y2="1" stroke="#ffffff"/>
    <rect x="20" y="20" width="480" height="170" rx="8" fill="url(#checkerD)"/><rect x="20" y="20" width="480" height="170" rx="8" fill="#faf8f5" opacity="0.5"/>
    <g transform="translate(190,78)" filter="url(#softD)"><rect width="140" height="48" rx="8" fill="url(#clayD)"/><line x1="10" y1="1.5" x2="130" y2="1.5" stroke="#f0c3ac"/><text x="70" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#171614">Primary</text></g>
    <text x="36" y="44" font-family="JetBrains Mono, monospace" font-size="10" fill="#75716d">sandbox="allow-scripts"</text>
    <text x="20" y="226" font-family="Newsreader, Georgia, serif" font-size="20" font-weight="600" fill="#171614">Button / Primary</text>
    <g transform="translate(390,212)"><rect width="78" height="24" rx="12" fill="#dee8fd"/><text x="14" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#345197">actions</text></g>
    <text x="20" y="256" font-family="JetBrains Mono, monospace" font-size="12" fill="#75716d">320 × 96</text>
    <g transform="translate(394,242)"><rect width="98" height="22" rx="11" fill="#d4f1d8"/><text x="12" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#2a7a42">✓ validated</text></g>
    <line x1="20" y1="276" x2="500" y2="276" stroke="#eae6df"/>
    <g transform="translate(20,288)" filter="url(#clayGlowD)"><rect width="92" height="26" rx="8" fill="url(#clayD)"/><text x="14" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#171614">✦ Refine</text></g>
    <g transform="translate(124,288)"><rect width="80" height="26" rx="8" fill="none" stroke="#c7c3bd"/><text x="14" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#423f3d">⧉ Copy</text></g>
    <text x="400" y="306" font-family="JetBrains Mono, monospace" font-size="10" fill="#75716d">on hover</text>
  </g>

  <!-- callouts -->
  <g transform="translate(648,194)" font-family="JetBrains Mono, monospace" font-size="12">
    <g><line x1="-32" y1="20" x2="-180" y2="20" stroke="#c7c3bd"/><circle cx="-180" cy="20" r="2.5" fill="#345197"/>
      <text x="0" y="16" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="600" fill="#171614">Preview region</text>
      <text x="0" y="36" fill="#75716d">live render · sandboxed iframe · per-card CSP</text></g>
    <g transform="translate(0,76)"><line x1="-32" y1="20" x2="-300" y2="20" stroke="#c7c3bd"/><circle cx="-300" cy="20" r="2.5" fill="#345197"/>
      <text x="0" y="16" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="600" fill="#171614">Name + group pill</text>
      <text x="0" y="36" fill="#75716d">Newsreader serif · group from @genie marker</text></g>
    <g transform="translate(0,152)"><line x1="-32" y1="20" x2="-300" y2="20" stroke="#c7c3bd"/><circle cx="-300" cy="20" r="2.5" fill="#345197"/>
      <text x="0" y="16" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="600" fill="#171614">Meta + validation</text>
      <text x="0" y="36" fill="#75716d">viewport size · ✓ validated / ⚠ / thin</text></g>
    <g transform="translate(0,228)"><line x1="-260" y1="20" x2="-300" y2="20" stroke="#c7c3bd"/><circle cx="-300" cy="20" r="2.5" fill="#c87c5e"/>
      <text x="0" y="16" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="600" fill="#171614">Hover affordances</text>
      <text x="0" y="36" fill="#75716d">✦ Refine (ds:request-refine) · ⧉ Copy</text>
      <text x="0" y="54" fill="#ac5a40">clay = the "ask Claude to fix this" spark</text></g>
  </g>

  <!-- ── THE MARKER ── -->
  <g transform="translate(64,540)">
    <text font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="0.06em" fill="#75716d">THE MARKER — WHAT MAKES A PREVIEW A CARD</text>
    <g transform="translate(0,26)">
      <rect width="1152" height="118" rx="12" fill="#efeae2" stroke="#dad7d2"/><line x1="16" y1="1" x2="1136" y2="1" stroke="#faf7f1"/>
      <text x="22" y="34" font-family="JetBrains Mono, monospace" font-size="12" fill="#75716d">// first line of every &lt;Name&gt;/preview.html</text>
      <text x="22" y="62" font-family="JetBrains Mono, monospace" font-size="15" fill="#75716d">&lt;!-- <tspan fill="#345197" font-weight="700">@genie</tspan> group=<tspan fill="#2a7440">"actions"</tspan> viewport=<tspan fill="#2a7440">"320x96"</tspan> --&gt;</text>
      <text x="22" y="90" font-family="JetBrains Mono, monospace" font-size="12" fill="#423f3d">validated against genie's native marker regex:</text>
      <text x="22" y="108" font-family="JetBrains Mono, monospace" font-size="13" fill="#ac5a40">/^&lt;!--\s*@genie\s+group="[^"]*"[^&gt;]*--&gt;/</text>
    </g>
  </g>

  <!-- ── VALIDATION STATES ── -->
  <g transform="translate(64,712)"><text font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="0.06em" fill="#75716d">VALIDATION STATES</text></g>
  <g transform="translate(64,748)">
    <!-- valid -->
    <g><rect width="264" height="180" rx="12" fill="#f3f0ea" stroke="#dad7d2"/><line x1="12" y1="1" x2="252" y2="1" stroke="#ffffff"/>
      <rect x="14" y="14" width="236" height="96" rx="6" fill="#eae6df"/>
      <g transform="translate(96,42)"><rect width="72" height="32" rx="6" fill="url(#clayD)"/><text x="36" y="21" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#171614">Primary</text></g>
      <text x="14" y="134" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="600" fill="#171614">Button / Primary</text>
      <g transform="translate(14,146)"><rect width="92" height="22" rx="11" fill="#d4f1d8"/><text x="10" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#2a7a42">✓ validated</text></g>
      <text x="0" y="206" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">valid</text></g>
    <!-- missing -->
    <g transform="translate(296,0)"><rect width="264" height="180" rx="12" fill="#ffdcd4" stroke="#c5372f"/>
      <rect x="14" y="14" width="236" height="96" rx="6" fill="#eae6df"/><rect x="14" y="14" width="236" height="96" rx="6" fill="#c5372f" opacity="0.10"/>
      <text x="132" y="66" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#c5372f">no @genie marker</text>
      <text x="14" y="134" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="600" fill="#171614">Untagged.html</text>
      <g transform="translate(14,146)"><rect width="150" height="22" rx="11" fill="#fbcfc7"/><text x="10" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#c5372f">⚠ missing @genie</text></g>
      <text x="0" y="206" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">missing</text></g>
    <!-- thin -->
    <g transform="translate(592,0)"><rect width="264" height="180" rx="12" fill="#f3f0ea" stroke="#c7c3bd"/>
      <rect x="14" y="14" width="236" height="96" rx="6" fill="#eae6df"/>
      <text x="132" y="66" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">(rendered empty)</text>
      <text x="14" y="134" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="600" fill="#171614">Spacer</text>
      <g transform="translate(14,146)"><rect width="56" height="22" rx="11" fill="#faf8f5" stroke="#c7c3bd"/><text x="14" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#423f3d">thin</text></g>
      <text x="0" y="206" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">thin (bodyless)</text></g>
    <!-- generating -->
    <g transform="translate(888,0)"><rect x="-4" y="-4" width="272" height="188" rx="14" fill="#c87c5e" opacity="0.16"/><rect width="264" height="180" rx="12" fill="#fae2d8" stroke="#c87c5e" stroke-width="2"/>
      <rect x="14" y="14" width="236" height="96" rx="6" fill="#fbd5c3"/>
      <text x="132" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ac5a40">✦ Conjuring…</text>
      <rect x="60" y="76" width="144" height="6" rx="3" fill="#ecb6a0"/><rect x="60" y="76" width="84" height="6" rx="3" fill="#c87c5e"/>
      <text x="14" y="134" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="600" fill="#171614">Button / Icon</text>
      <g transform="translate(14,146)"><rect width="104" height="22" rx="11" fill="#fbd5c3"/><text x="10" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#ac5a40">✦ generating</text></g>
      <text x="0" y="206" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">generating · the spark</text></g>
  </g>

  <!-- ── LIGHT + DARK ── -->
  <g transform="translate(64,1028)"><text font-family="Inter, sans-serif" font-size="12" font-weight="600" letter-spacing="0.06em" fill="#75716d">SAME CARD · ds:theme light / dark</text></g>
  <g transform="translate(96,1072)">
    <text x="0" y="-6" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">ds:theme "light"</text>
    <rect width="460" height="300" rx="14" fill="#f3f0ea" stroke="#dad7d2" filter="url(#softD)"/><line x1="14" y1="1" x2="446" y2="1" stroke="#ffffff"/>
    <rect x="18" y="18" width="424" height="160" rx="8" fill="#eae6df"/>
    <g transform="translate(160,68)" filter="url(#softD)"><rect width="140" height="48" rx="8" fill="url(#clayD)"/><line x1="10" y1="1.5" x2="130" y2="1.5" stroke="#f0c3ac"/><text x="70" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#171614">Primary</text></g>
    <text x="18" y="212" font-family="Newsreader, Georgia, serif" font-size="18" font-weight="600" fill="#171614">Button / Primary</text>
    <g transform="translate(346,198)"><rect width="78" height="24" rx="12" fill="#dee8fd"/><text x="14" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#345197">actions</text></g>
    <text x="18" y="242" font-family="JetBrains Mono, monospace" font-size="12" fill="#75716d">320 × 96</text>
    <g transform="translate(18,256)" filter="url(#clayGlowD)"><rect width="92" height="26" rx="8" fill="url(#clayD)"/><text x="14" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#171614">✦ Refine</text></g>
    <g transform="translate(122,256)"><rect width="80" height="26" rx="8" fill="none" stroke="#c7c3bd"/><text x="14" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#423f3d">⧉ Copy</text></g>
  </g>
  <g transform="translate(624,1072)">
    <text x="0" y="-6" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">ds:theme "dark"</text>
    <rect width="460" height="300" rx="14" fill="#201c18" stroke="#37322c" filter="url(#softDk)"/>
    <rect x="18" y="18" width="424" height="160" rx="8" fill="#2a2620"/>
    <g transform="translate(160,68)"><rect width="140" height="48" rx="8" fill="#d18a6a"/><text x="70" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#171614">Primary</text></g>
    <text x="18" y="212" font-family="Newsreader, Georgia, serif" font-size="18" font-weight="600" fill="#eeebe5">Button / Primary</text>
    <g transform="translate(346,198)"><rect width="78" height="24" rx="12" fill="#2a2620"/><text x="14" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#7195e8">actions</text></g>
    <text x="18" y="242" font-family="JetBrains Mono, monospace" font-size="12" fill="#b5b0a9">320 × 96</text>
    <g transform="translate(18,256)"><rect width="92" height="26" rx="8" fill="#d18a6a"/><text x="14" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#171614">✦ Refine</text></g>
    <g transform="translate(122,256)"><rect width="80" height="26" rx="8" fill="none" stroke="#4a443c"/><text x="14" y="18" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#b5b0a9">⧉ Copy</text></g>
  </g>

  <line x1="64" y1="1420" x2="1216" y2="1420" stroke="#dad7d2"/>
  <text x="64" y="1448" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">genie · @genie · the atomic unit · clay = refine + generate only · Claude-aligned · matches tokens.css</text>
  <text x="1216" y="1448" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">reference</text>
</svg>
