<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080" font-family="Inter, system-ui, sans-serif">
<!-- Hallmark · genie (hybrid) · genre: editorial-modern · pre-emit critique: P5 H5 E5 S5 R5 V5
     Surface 3 — THE EMBEDDED TIER · 3 DISPLAY MODES. The SAME ui://genie/grid iframe in
     inline / fullscreen / pip per the MCP Apps spec (2026-01-26), inside Claude Desktop.
     System fonts (CSP blocks web fonts), host-deferred surface, genie-gilt identity holds. -->
  <defs>
    <linearGradient id="lamp3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c87c5e"/><stop offset="1" stop-color="#ac5a40"/></linearGradient>
    <linearGradient id="gilt3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d9916e"/><stop offset="0.5" stop-color="#c87c5e"/><stop offset="1" stop-color="#b8674e"/></linearGradient>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#171614" flood-opacity="0.10"/></filter>
    <filter id="lift3" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="12" stdDeviation="32" flood-color="#171614" flood-opacity="0.22"/></filter>
  </defs>

  <rect width="1440" height="1080" fill="#faf8f5"/>

  <!-- masthead -->
  <g transform="translate(64,48)">
    <rect width="34" height="34" rx="9" fill="url(#lamp3)" filter="url(#soft3)"/>
    <g transform="scale(1.1333)"><path d="M7.5 19.5 q7.5 -11 15 0" fill="none" stroke="#faf8f5" stroke-width="2.1" stroke-linecap="round"/><path d="M15 4 l1 3 3 1 -3 1 -1 3 -1 -3 -3 -1 3 -1 z" fill="#faf8f5"/></g>
    <text x="50" y="17" font-family="Newsreader, Georgia, serif" font-size="30" font-weight="600" letter-spacing="-0.015em" fill="#171614">genie</text>
    <text x="50" y="40" font-family="JetBrains Mono, monospace" font-size="13" fill="#75716d">design system · the embedded tier · 3 display modes · v1.0</text>
  </g>
  <text x="1376" y="52" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#75716d">MCP Apps spec · 2026-01-26</text>
  <text x="1376" y="72" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#75716d">ui://genie/grid · same iframe, 3 framings</text>
  <line x1="64" y1="104" x2="1376" y2="104" stroke="#dad7d2"/>

  <!-- constraint strip -->
  <g transform="translate(64,128)">
    <rect width="1312" height="56" rx="12" fill="#efeae2" stroke="#dad7d2"/><line x1="16" y1="1" x2="1296" y2="1" stroke="#faf7f1"/>
    <text x="22" y="24" font-family="Inter, sans-serif" font-size="13.5" fill="#171614">Under the MCP-App CSP (<tspan font-family="JetBrains Mono, monospace" font-size="12" fill="#c5372f">default-src 'none'</tspan>): <tspan font-weight="600">system fonts only</tspan>, surface defers to host theme. genie-gilt + structure carry identity.</text>
    <text x="22" y="44" font-family="Inter, sans-serif" font-size="13.5" fill="#423f3d">genie declares <tspan font-family="JetBrains Mono, monospace" font-size="12" fill="#345197">availableDisplayModes</tspan> at <tspan font-family="JetBrains Mono, monospace" font-size="12" fill="#345197">ui/initialize</tspan>; host picks; genie calls <tspan font-family="JetBrains Mono, monospace" font-size="12" fill="#345197">ui/request-display-mode</tspan> to switch.</text>
  </g>

  <!-- ════ MODE 1: INLINE (a card in the conversation) ════ -->
  <g transform="translate(64,212)">
    <text font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#345197">▸ inline</text>
    <text x="80" y="0" font-family="Inter, sans-serif" font-size="12" fill="#75716d">default · embedded in the host's content flow</text>
    <!-- a Claude Desktop conversation with genie inline -->
    <g transform="translate(0,16)">
      <rect width="412" height="540" rx="14" fill="#ffffff" stroke="#dad7d2" filter="url(#soft3)"/>
      <!-- host chrome: convo header -->
      <rect width="412" height="40" rx="14" fill="#f3f0ea"/><rect y="26" width="412" height="14" fill="#f3f0ea"/><line x1="0" y1="40" x2="412" y2="40" stroke="#dad7d2"/>
      <text x="16" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#171614">Claude Desktop</text>
      <text x="396" y="25" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#75716d">host chrome</text>
      <!-- user msg -->
      <g transform="translate(16,56)"><rect width="380" height="38" rx="10" fill="#dee8fd"/><text x="14" y="23" font-family="system-ui, sans-serif" font-size="12.5" fill="#171614">show me the button component</text></g>
      <!-- claude msg + the INLINE genie card -->
      <g transform="translate(16,104)"><circle cx="9" cy="9" r="9" fill="url(#lamp3)"/><text x="26" y="13" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#171614">Claude · via genie</text></g>
      <!-- genie inline card (system fonts, compact) -->
      <g transform="translate(16,128)">
        <rect width="380" height="180" rx="10" fill="#faf8f5" stroke="#ecb6a0"/><line x1="10" y1="1" x2="370" y2="1" stroke="#ffffff"/>
        <text x="14" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ac5a40">✦ genie · Button</text>
        <text x="366" y="22" text-anchor="end" font-family="ui-monospace, monospace" font-size="9.5" fill="#75716d">inline</text>
        <!-- mini render -->
        <rect x="14" y="32" width="352" height="84" rx="8" fill="#f0ece5"/>
        <g transform="translate(135,58)" filter="url(#soft3)"><rect width="110" height="34" rx="8" fill="url(#gilt3)"/><line x1="8" y1="1" x2="102" y2="1" stroke="#f0c3ac"/><text x="55" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#171614">Primary</text></g>
        <!-- meta -->
        <text x="14" y="138" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#171614">Button / Primary</text>
        <g transform="translate(14,146)"><rect width="76" height="18" rx="9" fill="#fae2d8"/><text x="9" y="13" font-family="ui-monospace, monospace" font-size="9.5" fill="#ac5a40">primitives</text></g>
        <text x="300" y="159" font-family="ui-monospace, monospace" font-size="9.5" fill="#2a7a42">✓ validated</text>
        <!-- expand affordance -->
        <g transform="translate(280,144)"><rect width="86" height="22" rx="7" fill="#171614"/><text x="10" y="15" font-family="system-ui, sans-serif" font-size="10.5" fill="#faf8f5">⤢ Fullscreen</text></g>
      </g>
      <text x="16" y="338" font-family="system-ui, sans-serif" font-size="12.5" fill="#423f3d">Tweak it, or ask me to refine — I'll regenerate.</text>
      <!-- host input -->
      <g transform="translate(16,500)"><rect width="380" height="32" rx="10" fill="#f3f0ea" stroke="#dad7d2"/><text x="14" y="21" font-family="system-ui, sans-serif" font-size="12" fill="#75716d">Message Claude…</text></g>
    </g>
  </g>

  <!-- ════ MODE 2: FULLSCREEN (takes over the window) ════ -->
  <g transform="translate(516,212)">
    <text font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#345197">▸ fullscreen</text>
    <text x="116" y="0" font-family="Inter, sans-serif" font-size="12" fill="#75716d">View takes over the window — what Claude Desktop does</text>
    <g transform="translate(0,16)">
      <rect width="592" height="540" rx="14" fill="#faf8f5" stroke="#c7c3bd" filter="url(#lift3)"/>
      <!-- thin host bar (receded) -->
      <rect width="592" height="28" rx="14" fill="#171614"/><rect y="14" width="592" height="14" fill="#171614"/>
      <text x="16" y="19" font-family="system-ui, sans-serif" font-size="11" fill="#b5b0a9">Claude Desktop</text>
      <g transform="translate(470,6)"><rect width="110" height="16" rx="8" fill="#37322c"/><text x="10" y="12" font-family="ui-monospace, monospace" font-size="9" fill="#e5b098">✦ genie · fullscreen</text></g>
      <!-- genie OWNS the screen — its full grid (system fonts) -->
      <g transform="translate(0,28)">
        <!-- genie top bar -->
        <rect width="592" height="40" fill="#f3f0ea"/><line x1="0" y1="40" x2="592" y2="40" stroke="#dad7d2"/>
        <circle cx="22" cy="20" r="11" fill="url(#lamp3)"/><path d="M16 24 q6 -8 12 0 M22 12 v-3.5" stroke="#faf8f5" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <text x="42" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#171614">genie</text>
        <text x="92" y="25" font-family="ui-monospace, monospace" font-size="10" fill="#75716d">Quanta · 30 components</text>
        <g transform="translate(420,8)"><rect width="92" height="24" rx="8" fill="url(#gilt3)"/><line x1="8" y1="1" x2="84" y2="1" stroke="#f0c3ac"/><text x="46" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#171614">✦ Generate</text></g>
        <g transform="translate(522,8)"><rect width="58" height="24" rx="8" fill="#faf8f5" stroke="#c7c3bd"/><text x="10" y="16" font-family="system-ui, sans-serif" font-size="10.5" fill="#423f3d">⤡ Min</text></g>
        <!-- group header -->
        <text x="20" y="76" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#345197">primitives · 8</text>
        <line x1="116" y1="72" x2="572" y2="72" stroke="#eae6df"/>
        <!-- grid of cards (3 cols, system fonts) -->
        <g transform="translate(20,88)">
          <!-- card -->
          <g><rect width="176" height="120" rx="10" fill="#faf8f5" stroke="#e3ded4"/><line x1="10" y1="1" x2="166" y2="1" stroke="#ffffff"/><rect x="12" y="12" width="152" height="64" rx="6" fill="#f0ece5"/><g transform="translate(56,30)"><rect width="64" height="28" rx="7" fill="url(#gilt3)"/><text x="32" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#171614">Primary</text></g><text x="12" y="96" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#171614">Button</text><text x="164" y="110" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#2a7a42">✓</text></g>
          <g transform="translate(188,0)"><rect width="176" height="120" rx="10" fill="#faf8f5" stroke="#e3ded4"/><line x1="10" y1="1" x2="166" y2="1" stroke="#ffffff"/><rect x="12" y="12" width="152" height="64" rx="6" fill="#f0ece5"/><g transform="translate(48,30)"><rect width="80" height="28" rx="7" fill="#faf8f5" stroke="#c7c3bd"/><text x="40" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#171614">Secondary</text></g><text x="12" y="96" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#171614">Button · 2</text><text x="164" y="110" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#2a7a42">✓</text></g>
          <g transform="translate(376,0)"><rect width="176" height="120" rx="10" fill="#faf8f5" stroke="#e3ded4"/><line x1="10" y1="1" x2="166" y2="1" stroke="#ffffff"/><rect x="12" y="12" width="152" height="64" rx="6" fill="#f0ece5"/><g transform="translate(60,28)"><rect width="56" height="32" rx="7" fill="#faf8f5" stroke="#c7c3bd"/><rect x="14" y="10" width="28" height="12" rx="6" fill="#345197"/></g><text x="12" y="96" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#171614">Badge</text><text x="164" y="110" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#2a7a42">✓</text></g>
          <!-- row 2 -->
          <g transform="translate(0,132)"><rect width="176" height="120" rx="10" fill="#faf8f5" stroke="#e3ded4"/><line x1="10" y1="1" x2="166" y2="1" stroke="#ffffff"/><rect x="12" y="12" width="152" height="64" rx="6" fill="#f0ece5"/><g transform="translate(36,32)"><rect width="104" height="22" rx="5" fill="#faf8f5" stroke="#c7c3bd"/><text x="10" y="15" font-family="system-ui, sans-serif" font-size="9" fill="#75716d">email@…</text></g><text x="12" y="96" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#171614">Input</text><text x="164" y="110" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#2a7a42">✓</text></g>
          <!-- generating card -->
          <g transform="translate(188,132)"><rect x="-2" y="-2" width="180" height="124" rx="11" fill="#c87c5e" opacity="0.14"/><rect width="176" height="120" rx="10" fill="#fae2d8" stroke="#ecb6a0"/><rect x="12" y="12" width="152" height="64" rx="6" fill="#fbd5c3"/><text x="88" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ac5a40">✦ Conjuring…</text><text x="12" y="96" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#171614">Card</text></g>
          <g transform="translate(376,132)"><rect width="176" height="120" rx="10" fill="#faf8f5" stroke="#e3ded4"/><line x1="10" y1="1" x2="166" y2="1" stroke="#ffffff"/><rect x="12" y="12" width="152" height="64" rx="6" fill="#f0ece5"/><g transform="translate(52,34)"><rect width="72" height="20" rx="10" fill="#d4f1d8"/><text x="10" y="14" font-family="ui-monospace, monospace" font-size="9" fill="#2a7a42">✓ toast</text></g><text x="12" y="96" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#171614">Toast</text><text x="164" y="110" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#2a7a42">✓</text></g>
        </g>
        <!-- status bar -->
        <line x1="0" y1="448" x2="592" y2="448" stroke="#dad7d2"/>
        <text x="20" y="468" font-family="ui-monospace, monospace" font-size="10" fill="#75716d">✓ 28 validated · ✦ 1 generating · system-ui · host-light</text>
      </g>
    </g>
  </g>

  <!-- ════ MODE 3: PIP (floating overlay) ════ -->
  <g transform="translate(1140,212)">
    <text font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#345197">▸ pip</text>
    <text x="48" y="0" font-family="Inter, sans-serif" font-size="12" fill="#75716d">floating overlay</text>
    <g transform="translate(0,16)">
      <!-- the host (dimmed, you're working elsewhere) -->
      <rect width="236" height="540" rx="14" fill="#f3f0ea" stroke="#dad7d2"/>
      <text x="18" y="28" font-family="ui-monospace, monospace" font-size="10" fill="#a39c92">(working in the editor…)</text>
      <g opacity="0.4" font-family="ui-monospace, monospace" font-size="10" fill="#75716d">
        <text x="18" y="56">function Button() {</text><text x="18" y="74">  return &lt;button</text><text x="18" y="92">    className="ds-btn" /&gt;</text><text x="18" y="110">}</text>
      </g>
      <!-- the floating PIP — genie mini-preview, persistent -->
      <g transform="translate(36,360)" filter="url(#lift3)">
        <rect width="184" height="148" rx="12" fill="#faf8f5" stroke="#ecb6a0"/><line x1="10" y1="1" x2="174" y2="1" stroke="#ffffff"/>
        <!-- pip header w/ drag dots + close -->
        <rect width="184" height="26" rx="12" fill="#fae2d8"/><rect y="14" width="184" height="12" fill="#fae2d8"/>
        <circle cx="14" cy="13" r="6" fill="url(#lamp3)"/>
        <text x="28" y="17" font-family="system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#ac5a40">genie</text>
        <text x="150" y="17" font-family="ui-monospace, monospace" font-size="8.5" fill="#ac5a40">pip</text>
        <circle cx="172" cy="13" r="2" fill="#75716d"/>
        <!-- mini render -->
        <rect x="12" y="34" width="160" height="64" rx="8" fill="#f0ece5"/>
        <g transform="translate(52,52)" filter="url(#soft3)"><rect width="80" height="28" rx="7" fill="url(#gilt3)"/><line x1="6" y1="1" x2="74" y2="1" stroke="#f0c3ac"/><text x="40" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#171614">Primary</text></g>
        <!-- mini status -->
        <text x="12" y="120" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#171614">Button / Primary</text>
        <text x="12" y="138" font-family="ui-monospace, monospace" font-size="9" fill="#2a7a42">✓ validated · live</text>
        <g transform="translate(132,126)"><rect width="40" height="16" rx="6" fill="#171614"/><text x="8" y="12" font-family="system-ui, sans-serif" font-size="9" fill="#faf8f5">⤢</text></g>
      </g>
    </g>
  </g>

  <!-- ── the rule ── -->
  <g transform="translate(64,800)">
    <rect width="1312" height="76" rx="12" fill="#fae2d8" stroke="#ecb6a0"/><line x1="16" y1="1" x2="1296" y2="1" stroke="#fcebe2"/>
    <text x="24" y="32" font-family="Newsreader, Georgia, serif" font-size="18" font-weight="600" fill="#171614">Same artifact, three framings</text>
    <text x="24" y="56" font-family="Inter, sans-serif" font-size="14" fill="#423f3d">The card markup is byte-identical across inline / fullscreen / pip (RFC G-5). Only the host's framing changes. genie must look right at all three scales — a compact chat card, a full-window grid, and a floating mini-preview — on system fonts, deferring to the host's theme, with genie-gilt holding identity throughout.</text>
  </g>

  <line x1="64" y1="924" x2="1376" y2="924" stroke="#dad7d2"/>
  <text x="64" y="952" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">genie · embedded tier · inline / fullscreen / pip · MCP Apps spec 2026-01-26 · system fonts · host-deferred · surface 3 / 3</text>
  <text x="1376" y="952" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">surface 3 / 3</text>
</svg>
