<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" font-family="'Archivo', system-ui, sans-serif">
<!-- Hallmark · genie (instrument) · genre: swiss-functional · pre-emit critique: P5 H5 E5 S5 R5 V5
     surface intent: preview + refine — generate a component, watch it render, refine it by command.
     LAYOUT ARCHETYPE = devtools console (NOT D1's ghosted-chat-rail / art-board-hero / slider-rail 3-pane).
     Refinement is a vertical REPL TRANSCRIPT of refine turns with inline diffs + a live input,
     paired with a PINNED flat render + a COMPUTED property sheet. No glow, no gilt, no art-board handles,
     no dimension arrows (D2 owns those), no slider knobs. Clay = sole signal, flat. ink-blue = focus/syntax only. -->
<rect width="1440" height="980" fill="#fbfbfb"/>

<!-- ===== masthead (universal furniture · instrument material) ===== -->
<rect width="1440" height="52" fill="#f4f4f5"/>
<line x1="0" y1="52" x2="1440" y2="52" stroke="#e2e2e4" stroke-width="1"/>
<g transform="translate(64,11)">
  <rect width="30" height="30" rx="5" fill="#c87c5e"/>
  <path d="M8 20 q7 -11 14 0" fill="none" stroke="#fbfbfb" stroke-width="2.1" stroke-linecap="round"/>
  <path d="M15 4 l1 3 3 1 -3 1 -1 3 -1 -3 -3 -1 3 -1 z" fill="#fbfbfb"/>
  <text x="44" y="15" font-size="19" font-weight="700" fill="#16171a" letter-spacing="-0.02em">genie</text>
  <text x="93" y="15" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">· in Claude Code</text>
</g>
<g transform="translate(1180,13)">
  <rect width="196" height="26" rx="6" fill="#16171a"/>
  <circle cx="16" cy="13" r="4.5" fill="#2f8f57"/>
  <text x="30" y="17" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#fbfbfb">harness-native · no app to open</text>
</g>

<!-- ===== command bar · the refine REPL line ===== -->
<g transform="translate(64,84)">
  <rect width="1312" height="48" rx="7" fill="#f4f4f5" stroke="#e2e2e4"/>
  <text x="20" y="30" font-family="'JetBrains Mono', monospace" font-size="14" fill="#ac5a40">genie ❯</text>
  <text x="86" y="30" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b" letter-spacing="0.04em">refine</text>
  <text x="140" y="30" font-size="14" font-weight="600" fill="#16171a">Button</text>
  <text x="210" y="30" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b">--weight 700</text>
  <text x="324" y="30" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b">--tracking -0.01</text>
  <text x="462" y="30" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#ac5a40">+radius 10 · staged</text>
  <text x="1292" y="30" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">session · 3 turns · 2 applied · 1 staged ▾</text>
</g>

<!-- column divider (devtools split) -->
<line x1="848" y1="156" x2="848" y2="912" stroke="#e2e2e4"/>

<!-- ============================================================ -->
<!-- REGION A · the refine session transcript (left)              -->
<!-- ============================================================ -->
<g transform="translate(64,164)">
  <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b" letter-spacing="0.12em">REFINE SESSION</text>
  <text x="0" y="38" font-size="18" font-weight="700" fill="#16171a">Button / Primary</text>
  <text x="760" y="20" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">primitives · 180×56</text>
  <text x="0" y="58" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b">refine prompts arrive from the harness chat — genie owns the render, tokens &amp; diff</text>
  <line x1="0" y1="72" x2="760" y2="72" stroke="#e2e2e4"/>

  <!-- turn 1 · generate (done) -->
  <g transform="translate(0,90)">
    <text x="0" y="14" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ac5a40">you ❯</text>
    <text x="48" y="14" font-size="13" fill="#454649">generate Button — "confident and warm"</text>
    <text x="760" y="14" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#2f8f57">✓ applied</text>
    <text x="0" y="38" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ac5a40">genie ↳</text>
    <text x="54" y="38" font-size="13" fill="#16171a">Button / Primary · 3 states · wrote 4 files</text>
    <line x1="0" y1="54" x2="760" y2="54" stroke="#e2e2e4"/>
  </g>

  <!-- turn 2 · refine (applied) -->
  <g transform="translate(0,160)">
    <text x="0" y="14" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ac5a40">you ❯</text>
    <text x="48" y="14" font-size="13" fill="#454649">tighter label, more confident</text>
    <text x="760" y="14" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#2f8f57">✓ applied · 4h ago</text>
    <g font-family="'JetBrains Mono', monospace" font-size="11.5">
      <text x="54" y="38" fill="#86878b">label.weight</text>
      <text x="150" y="38" fill="#86878b" text-decoration="line-through">600</text>
      <text x="182" y="38" fill="#86878b">→</text>
      <text x="198" y="38" fill="#2f8f57">700</text>
      <text x="262" y="38" fill="#86878b">tracking</text>
      <text x="330" y="38" fill="#86878b" text-decoration="line-through">0</text>
      <text x="346" y="38" fill="#86878b">→</text>
      <text x="362" y="38" fill="#2f8f57">−0.01em</text>
    </g>
    <line x1="0" y1="54" x2="760" y2="54" stroke="#e2e2e4"/>
  </g>

  <!-- turn 3 · refine (STAGED · active · clay is the signal) -->
  <g transform="translate(0,232)">
    <rect x="-12" y="-10" width="784" height="96" rx="6" fill="#faf3ef"/>
    <rect x="-12" y="-10" width="784" height="96" rx="6" fill="none" stroke="#e8bda8"/>
    <text x="0" y="14" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ac5a40">you ❯</text>
    <text x="48" y="14" font-size="13" font-weight="600" fill="#16171a">a touch more corner radius</text>
    <text x="760" y="14" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#ac5a40">▾ staged</text>
    <g font-family="'JetBrains Mono', monospace" font-size="11.5">
      <text x="54" y="38" fill="#86878b">border-radius</text>
      <text x="156" y="38" fill="#86878b" text-decoration="line-through">8px</text>
      <text x="190" y="38" fill="#86878b">→</text>
      <text x="206" y="38" fill="#2f8f57">10px</text>
      <text x="260" y="38" fill="#86878b">·  resolves --radius-md</text>
    </g>
    <!-- inline actions: Apply (flat clay) + Discard -->
    <g transform="translate(54,52)">
      <rect width="96" height="28" rx="6" fill="#c87c5e"/>
      <text x="18" y="19" font-size="13" font-weight="700" fill="#fbfbfb">Apply</text>
      <text x="76" y="19" font-family="'JetBrains Mono', monospace" font-size="11" fill="#fbfbfb">↵</text>
      <g transform="translate(108,0)">
        <rect width="88" height="28" rx="6" fill="#fbfbfb" stroke="#c9c9cc"/>
        <text x="16" y="19" font-size="13" font-weight="600" fill="#454649">Discard</text>
      </g>
      <text x="706" y="19" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b">or type the next refine ↓</text>
    </g>
  </g>

  <!-- live REPL input · the cursor waits -->
  <g transform="translate(0,344)">
    <rect width="760" height="40" rx="7" fill="#fbfbfb" stroke="#e2e2e4"/>
    <text x="18" y="25" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ac5a40">you ❯</text>
    <rect x="66" y="13" width="8" height="15" fill="#c87c5e"/>
    <text x="84" y="25" font-size="14" fill="#86878b">refine Button…  (e.g. "make the label a hair smaller")</text>
  </g>

  <!-- files touched (the devtools "changes" readout) -->
  <g transform="translate(0,410)">
    <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b" letter-spacing="0.12em">FILES TOUCHED</text>
    <g font-family="'JetBrains Mono', monospace" font-size="11.5">
      <rect x="0" y="26" width="8" height="8" rx="2" fill="#2f8f57"/>
      <text x="18" y="34" fill="#454649">Button.html</text>
      <text x="760" y="34" text-anchor="end" fill="#2f8f57">modified</text>
      <rect x="0" y="48" width="8" height="8" rx="2" fill="#2f8f57"/>
      <text x="18" y="56" fill="#454649">Button.tsx</text>
      <text x="760" y="56" text-anchor="end" fill="#2f8f57">modified</text>
      <rect x="0" y="70" width="8" height="8" rx="2" fill="#c9c9cc"/>
      <text x="18" y="78" fill="#454649">tokens.css</text>
      <text x="760" y="78" text-anchor="end" fill="#86878b">referenced</text>
      <rect x="0" y="92" width="8" height="8" rx="2" fill="#2f8f57"/>
      <text x="18" y="100" fill="#454649">Button.prompt.md</text>
      <text x="760" y="100" text-anchor="end" fill="#2f8f57">updated</text>
    </g>
  </g>
</g>

<!-- ============================================================ -->
<!-- REGION B · pinned render + computed property sheet (right)   -->
<!-- ============================================================ -->
<g transform="translate(872,164)">
  <!-- render · live -->
  <text x="0" y="12" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b" letter-spacing="0.12em">RENDER · LIVE</text>
  <text x="504" y="12" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#2f8f57">✓ in sync</text>
  <rect x="0" y="22" width="504" height="150" rx="7" fill="#f4f4f5" stroke="#e2e2e4"/>
  <g transform="translate(172,69)">
    <rect width="160" height="56" rx="10" fill="#c87c5e"/>
    <text x="80" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#fbfbfb">Get started</text>
  </g>
  <text x="14" y="162" font-family="'JetBrains Mono', monospace" font-size="10" fill="#86878b">Button / Primary · 160 × 56 · staged radius 10px · flat clay</text>

  <!-- states ribbon -->
  <text x="0" y="200" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b" letter-spacing="0.12em">STATES</text>
  <g transform="translate(0,210)">
    <!-- default -->
    <g transform="translate(0,0)">
      <rect width="92" height="40" rx="7" fill="#c87c5e"/>
      <text x="46" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#fbfbfb">Get started</text>
      <text x="46" y="56" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b">default</text>
    </g>
    <!-- hover -->
    <g transform="translate(100,0)">
      <rect width="92" height="40" rx="7" fill="#ac5a40"/>
      <text x="46" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#fbfbfb">Get started</text>
      <text x="46" y="56" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b">:hover</text>
    </g>
    <!-- focus (ink-blue ring · the one place ink-blue earns its keep) -->
    <g transform="translate(200,0)">
      <rect x="-3" y="-3" width="98" height="46" rx="9" fill="none" stroke="#4f6fc6" stroke-width="2"/>
      <rect width="92" height="40" rx="7" fill="#c87c5e"/>
      <text x="46" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#fbfbfb">Get started</text>
      <text x="46" y="56" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#4f6fc6">:focus-visible</text>
    </g>
    <!-- disabled -->
    <g transform="translate(300,0)">
      <rect width="92" height="40" rx="7" fill="#c87c5e" opacity="0.38"/>
      <text x="46" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#fbfbfb">Get started</text>
      <text x="46" y="56" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b">[disabled]</text>
    </g>
    <!-- loading -->
    <g transform="translate(400,0)">
      <rect width="92" height="40" rx="7" fill="#fbfbfb" stroke="#c9c9cc"/>
      <path d="M46 12 a8 8 0 1 1 -6 3" fill="none" stroke="#c87c5e" stroke-width="2.4" stroke-linecap="round"/>
      <text x="46" y="56" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b">data-loading</text>
    </g>
  </g>

  <!-- computed property sheet (replaces D1's slider rail) -->
  <text x="0" y="300" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b" letter-spacing="0.12em">COMPUTED</text>
  <text x="504" y="300" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#86878b">after refine · resolved</text>
  <line x1="0" y1="308" x2="504" y2="308" stroke="#e2e2e4"/>
  <g font-family="'JetBrains Mono', monospace" font-size="11.5">
    <text x="0" y="328" fill="#86878b">border-radius</text>
    <text x="170" y="328" fill="#16171a">var(--radius-md)</text>
    <text x="504" y="328" text-anchor="end" fill="#2f8f57">10px</text>
    <text x="0" y="350" fill="#86878b">label.weight</text>
    <text x="170" y="350" fill="#16171a">700</text>
    <text x="0" y="372" fill="#86878b">letter-spacing</text>
    <text x="170" y="372" fill="#16171a">−0.01em</text>
    <text x="0" y="394" fill="#86878b">padding-inline</text>
    <text x="170" y="394" fill="#16171a">32px</text>
    <text x="0" y="416" fill="#86878b">surface</text>
    <rect x="170" y="407" width="11" height="11" rx="2" fill="#c87c5e"/>
    <text x="188" y="416" fill="#16171a">accent / clay</text>
    <text x="504" y="416" text-anchor="end" fill="#86878b">#c87c5e</text>
    <text x="0" y="438" fill="#86878b">min-size</text>
    <text x="170" y="438" fill="#16171a">160 × 56</text>
    <text x="0" y="460" fill="#86878b">marker</text>
    <text x="170" y="460" fill="#ac5a40">@dsCard ✓</text>
  </g>
  <line x1="0" y1="474" x2="504" y2="474" stroke="#e2e2e4"/>

  <!-- code strip -->
  <text x="0" y="500" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b" letter-spacing="0.12em">CODE</text>
  <text x="504" y="500" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ac5a40">Button.html ▾</text>
  <rect x="0" y="510" width="504" height="86" rx="5" fill="#f7f7f7" stroke="#e2e2e4"/>
  <g font-family="'JetBrains Mono', monospace" font-size="11.5">
    <text x="16" y="532"><tspan fill="#86878b">&lt;</tspan><tspan fill="#4064b9" font-weight="600">button</tspan><tspan fill="#16171a"> class=</tspan><tspan fill="#2f8f57">"ds-btn ds-btn--primary"</tspan></text>
    <text x="16" y="552"><tspan fill="#16171a">        style=</tspan><tspan fill="#2f8f57">"border-radius: </tspan><tspan fill="#ac5a40">var(--radius-md)</tspan><tspan fill="#2f8f57">"</tspan><tspan fill="#86878b">&gt;</tspan></text>
    <text x="16" y="572"><tspan fill="#16171a">  Get started</tspan></text>
    <text x="16" y="588"><tspan fill="#86878b">&lt;/</tspan><tspan fill="#4064b9" font-weight="600">button</tspan><tspan fill="#86878b">&gt;</tspan><tspan fill="#86878b">   every value references a token — never an inline hex</tspan></text>
  </g>

  <!-- validation chip -->
  <g transform="translate(0,614)">
    <rect width="340" height="30" rx="7" fill="#fbfbfb" stroke="#e2e2e4"/>
    <circle cx="18" cy="15" r="4.5" fill="#2f8f57"/>
    <text x="32" y="19" font-family="'JetBrains Mono', monospace" font-size="11" fill="#454649">validated · @dsCard ok</text>
    <text x="324" y="19" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#ac5a40">1 change staged</text>
  </g>
</g>

<!-- ===== footer ===== -->
<text x="64" y="962" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b">genie · preview + refine (Button / Primary) · console transcript + pinned render · surface 2 / 4</text>
<text x="1376" y="962" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b">Instrument · console layout</text>
</svg>
