<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" font-family="'Archivo', system-ui, sans-serif">
<!-- Hallmark · genie (instrument) · genre: swiss-functional · pre-emit critique: P5 H5 E5 S5 R5 V5
     surface 0 / 4 — FRONT DOOR. LAYOUT ARCHETYPE = devtools console / REPL: a monospaced command line drives
     the page; output streams below as left-aligned hairline data tables (blueprints, recent kits). No centered
     hero, no big serif, no card row (that is D1). Off-white chroma-0 #fbfbfb; Archivo one-family + JetBrains Mono;
     FLAT clay #c87c5e is the SOLE colour and appears only on generate affordances; structure = 1px hairlines + air. -->
<defs>
  <clipPath id="cellclip"><rect x="0" y="13" width="60" height="36" rx="5"/></clipPath>
</defs>

<rect width="1440" height="980" fill="#fbfbfb"/>

<!-- ===== masthead (universal furniture, rendered in D4's neutral material) ===== -->
<rect width="1440" height="52" fill="#f4f4f5"/>
<line x1="0" y1="52" x2="1440" y2="52" stroke="#e2e2e4" stroke-width="1"/>
<g transform="translate(64,11)">
  <rect width="30" height="30" rx="5" fill="#c87c5e"/>
  <path d="M8 20 q7 -11 14 0" fill="none" stroke="#fbfbfb" stroke-width="2.1" stroke-linecap="round"/>
  <path d="M15 4 l1 3 3 1 -3 1 -1 3 -1 -3 -3 -1 3 -1 z" fill="#fbfbfb"/>
  <text x="44" y="15" font-size="19" font-weight="700" fill="#16171a" letter-spacing="-0.02em">genie</text>
  <text x="93" y="15" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">· in Claude Code</text>
</g>
<g transform="translate(1180,13)">
  <rect width="196" height="26" rx="6" fill="#16171a"/>
  <circle cx="16" cy="13" r="4.5" fill="#2f8f57"/>
  <text x="30" y="17" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#fbfbfb">harness-native · no app to open</text>
</g>

<!-- ===== command line (the REPL input — this is the page's centre of gravity) ===== -->
<g transform="translate(64,92)">
  <rect width="1312" height="108" rx="7" fill="#fbfbfb" stroke="#e2e2e4"/>
  <text x="26" y="44" font-family="'JetBrains Mono', monospace" font-size="14" fill="#ac5a40">genie ❯</text>
  <text x="96" y="44" font-size="18" fill="#16171a">generate a pricing card with three tiers and a highlighted middle plan</text>
  <rect x="694" y="31" width="9" height="18" fill="#c87c5e"/>
  <line x1="26" y1="66" x2="1286" y2="66" stroke="#e2e2e4"/>
  <text x="26" y="90" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b" letter-spacing="0.06em">kit</text>
  <text x="52" y="91" font-size="13" font-weight="600" fill="#16171a">Quanta · 30 components ▾</text>
  <text x="300" y="90" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86878b" letter-spacing="0.06em">model</text>
  <text x="348" y="91" font-size="13" font-weight="600" fill="#16171a">design-default ▾</text>
  <g transform="translate(1150,74)">
    <rect width="136" height="30" rx="5" fill="#c87c5e"/>
    <text x="22" y="20" font-size="13.5" font-weight="700" fill="#fbfbfb">Conjure</text>
    <path d="M104 15 h14 M111 8 v14" stroke="#fbfbfb" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</g>

<!-- ===== output stream · BLUEPRINTS (left-aligned hairline table, not a card row) ===== -->
<g transform="translate(64,248)">
  <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="11.5" font-weight="600" fill="#454649" letter-spacing="0.1em">BLUEPRINTS</text>
  <text x="1312" y="0" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">5 available · start from a blueprint</text>
  <line x1="0" y1="12" x2="1312" y2="12" stroke="#e2e2e4"/>

  <!-- row 1 · Button -->
  <g transform="translate(0,28)">
    <rect x="0" y="13" width="60" height="36" rx="5" fill="#fbfbfb" stroke="#e2e2e4"/>
    <rect x="14" y="23" width="32" height="16" rx="4" fill="#c87c5e"/>
    <text x="84" y="30" font-size="15.5" font-weight="600" fill="#16171a">Button</text>
    <text x="84" y="47" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b" letter-spacing="0.12em">PRIMITIVE</text>
    <text x="320" y="37" font-size="13.5" fill="#454649">The primary action element — clay Primary, white Secondary.</text>
    <text x="1312" y="37" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#86878b">open ⟶</text>
    <line x1="0" y1="62" x2="1312" y2="62" stroke="#e2e2e4"/>
  </g>
  <!-- row 2 · Card -->
  <g transform="translate(0,90)">
    <rect x="0" y="13" width="60" height="36" rx="5" fill="#fbfbfb" stroke="#e2e2e4"/>
    <rect x="15" y="21" width="30" height="20" rx="3" fill="none" stroke="#c9c9cc"/>
    <rect x="19" y="26" width="14" height="3" rx="1.5" fill="#c9c9cc"/>
    <rect x="19" y="32" width="22" height="2.5" rx="1.25" fill="#e2e2e4"/>
    <text x="84" y="30" font-size="15.5" font-weight="600" fill="#16171a">Card</text>
    <text x="84" y="47" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b" letter-spacing="0.12em">COMPONENT</text>
    <text x="320" y="37" font-size="13.5" fill="#454649">Container with header and body — composed from primitives.</text>
    <text x="1312" y="37" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#86878b">open ⟶</text>
    <line x1="0" y1="62" x2="1312" y2="62" stroke="#e2e2e4"/>
  </g>
  <!-- row 3 · Pricing -->
  <g transform="translate(0,152)">
    <rect x="0" y="13" width="60" height="36" rx="5" fill="#fbfbfb" stroke="#e2e2e4"/>
    <rect x="15" y="28" width="8" height="13" rx="1.5" fill="none" stroke="#c9c9cc"/>
    <rect x="26" y="23" width="8" height="18" rx="1.5" fill="none" stroke="#86878b"/>
    <rect x="37" y="28" width="8" height="13" rx="1.5" fill="none" stroke="#c9c9cc"/>
    <text x="84" y="30" font-size="15.5" font-weight="600" fill="#16171a">Pricing</text>
    <text x="84" y="47" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b" letter-spacing="0.12em">PATTERN</text>
    <text x="320" y="37" font-size="13.5" fill="#454649">Three tiers, highlighted middle plan — billing toggle ready.</text>
    <text x="1312" y="37" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#86878b">open ⟶</text>
    <line x1="0" y1="62" x2="1312" y2="62" stroke="#e2e2e4"/>
  </g>
  <!-- row 4 · Dashboard -->
  <g transform="translate(0,214)">
    <rect x="0" y="13" width="60" height="36" rx="5" fill="#fbfbfb" stroke="#e2e2e4"/>
    <rect x="13" y="22" width="34" height="18" rx="2.5" fill="none" stroke="#c9c9cc"/>
    <line x1="22" y1="22" x2="22" y2="40" stroke="#c9c9cc"/>
    <rect x="26" y="26" width="7" height="10" rx="1.5" fill="none" stroke="#e2e2e4"/>
    <rect x="36" y="26" width="7" height="10" rx="1.5" fill="none" stroke="#e2e2e4"/>
    <text x="84" y="30" font-size="15.5" font-weight="600" fill="#16171a">Dashboard</text>
    <text x="84" y="47" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b" letter-spacing="0.12em">LAYOUT</text>
    <text x="320" y="37" font-size="13.5" fill="#454649">Sidebar shell with a responsive content grid.</text>
    <text x="1312" y="37" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#86878b">open ⟶</text>
    <line x1="0" y1="62" x2="1312" y2="62" stroke="#e2e2e4"/>
  </g>
  <!-- row 5 · Email -->
  <g transform="translate(0,276)">
    <rect x="0" y="13" width="60" height="36" rx="5" fill="#fbfbfb" stroke="#e2e2e4"/>
    <rect x="15" y="23" width="30" height="18" rx="2.5" fill="none" stroke="#c9c9cc"/>
    <path d="M15 24 L30 34 L45 24" fill="none" stroke="#c9c9cc" stroke-linejoin="round"/>
    <text x="84" y="30" font-size="15.5" font-weight="600" fill="#16171a">Email</text>
    <text x="84" y="47" font-family="'JetBrains Mono', monospace" font-size="9.5" fill="#86878b" letter-spacing="0.12em">CAMPAIGN</text>
    <text x="320" y="37" font-size="13.5" fill="#454649">Responsive envelope — table-safe, dark-mode aware.</text>
    <text x="1312" y="37" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#86878b">open ⟶</text>
  </g>
</g>

<!-- ===== output stream · RECENT KITS (second table) ===== -->
<g transform="translate(64,624)">
  <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="11.5" font-weight="600" fill="#454649" letter-spacing="0.1em">RECENT KITS</text>
  <text x="1312" y="0" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">synced via /genie-sync</text>
  <line x1="0" y1="12" x2="1312" y2="12" stroke="#e2e2e4"/>

  <g transform="translate(0,26)">
    <rect x="2" y="18" width="14" height="14" rx="2.5" fill="#16171a"/>
    <text x="40" y="24" font-size="15" font-weight="600" fill="#16171a">Quanta UI Kit</text>
    <text x="40" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">30 components · 4 groups · brand / dataviz / nav / primitives</text>
    <text x="980" y="31" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#2f8f57">✓ default</text>
    <text x="1312" y="31" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b">4h ago</text>
    <line x1="0" y1="56" x2="1312" y2="56" stroke="#e2e2e4"/>
  </g>
  <g transform="translate(0,82)">
    <rect x="2" y="18" width="14" height="14" rx="2.5" fill="none" stroke="#c9c9cc"/>
    <text x="40" y="24" font-size="15" font-weight="600" fill="#16171a">Marketing Site Kit</text>
    <text x="40" y="42" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">12 components · 2 groups · hero / cta</text>
    <text x="1312" y="31" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b">2d ago</text>
  </g>
</g>

<!-- ===== status readout (anchors the lower air band; instrument always reports state) ===== -->
<line x1="64" y1="836" x2="1376" y2="836" stroke="#e2e2e4"/>
<text x="64" y="862" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">mcp__genie__ · ready · awaiting command</text>
<text x="1376" y="862" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#86878b">30 components indexed · ✓ @dsCard · system-ui fallback ready</text>

<!-- ===== footer ===== -->
<text x="64" y="952" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b">genie · front door (empty / generate state) · console / REPL · surface 0 / 4</text>
<text x="1376" y="952" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#86878b">Instrument · console layout</text>
</svg>
