<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">genie UI option 2 - launcher and library</title>
  <desc id="desc">A Claude Design-informed home dashboard for genie with a large prompt composer, UI kit selector, blueprint selector, model route selector, starter cards, and project library management.</desc>
  <metadata>
    Hallmark critique stamp: Macrostructure=Command Home; Theme=Editorial Console; Nav=N13 top command bar; Footer=Ft5 library rail; Claude Design context=home prompt, selectors, project types, searchable lists.
  </metadata>
  <style>
    :root {
      --bg: oklch(97% 0.018 82);
      --shell: oklch(99% 0.006 82);
      --panel: oklch(94.5% 0.018 82);
      --card: oklch(99.2% 0.004 82);
      --ink: oklch(20% 0.042 252);
      --muted: oklch(48% 0.032 252);
      --faint: oklch(71% 0.022 252);
      --line: oklch(85% 0.018 82);
      --line-strong: oklch(72% 0.032 252);
      --accent: oklch(60% 0.118 42);
      --accent-soft: oklch(91% 0.046 42);
      --green: oklch(58% 0.105 152);
      --blue: oklch(54% 0.088 252);
      --shadow: oklch(24% 0.032 252 / 0.12);
      --mono: "SFMono-Regular", "JetBrains Mono", ui-monospace, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }
    .bg { fill: var(--bg); }
    .shell { fill: var(--shell); stroke: var(--line); }
    .panel { fill: var(--panel); stroke: var(--line); }
    .card { fill: var(--card); stroke: var(--line); }
    .card-strong { fill: var(--card); stroke: var(--line-strong); }
    .soft { fill: var(--accent-soft); stroke: var(--accent); }
    .accent { fill: var(--accent); }
    .ink { fill: var(--ink); }
    .muted { fill: var(--muted); }
    .faint { fill: var(--faint); }
    .line { stroke: var(--line); }
    .line-strong { stroke: var(--line-strong); }
    .green { fill: var(--green); }
    .blue { fill: var(--blue); }
    .on-accent { fill: var(--shell); }
    .h1 { font: 700 34px var(--serif); fill: var(--ink); }
    .h2 { font: 700 17px var(--sans); fill: var(--ink); }
    .h3 { font: 650 13px var(--sans); fill: var(--ink); letter-spacing: .02em; }
    .body { font: 13px var(--sans); fill: var(--muted); }
    .small { font: 11px var(--sans); fill: var(--muted); }
    .tiny { font: 10px var(--mono); fill: var(--faint); letter-spacing: .02em; }
    .mono { font: 12px var(--mono); fill: var(--muted); }
    .button { fill: var(--card); stroke: var(--line); }
    .chip { fill: var(--shell); stroke: var(--line); }
    .shadow { filter: drop-shadow(0 18px 24px var(--shadow)); }
  </style>

  <rect class="bg" width="1440" height="980"/>
  <rect x="28" y="22" width="1384" height="936" rx="34" class="shell shadow"/>

  <rect x="60" y="48" width="1320" height="68" rx="24" class="panel"/>
  <circle cx="96" cy="82" r="15" class="ink"/>
  <circle cx="104" cy="76" r="5" class="accent"/>
  <text x="128" y="88" class="h2">genie</text>
  <text x="196" y="88" class="tiny">MCP UI generator</text>
  <rect x="920" y="66" width="116" height="32" rx="16" class="chip"/>
  <text x="978" y="87" text-anchor="middle" class="small">Projects</text>
  <rect x="1046" y="66" width="104" height="32" rx="16" class="chip"/>
  <text x="1098" y="87" text-anchor="middle" class="small">UI kits</text>
  <rect x="1160" y="66" width="120" height="32" rx="16" class="chip"/>
  <text x="1220" y="87" text-anchor="middle" class="small">Blueprints</text>
  <rect x="1290" y="66" width="58" height="32" rx="16" class="button"/>
  <text x="1319" y="87" text-anchor="middle" class="small">R</text>

  <text x="188" y="188" class="tiny">NEW PROJECT</text>
  <text x="188" y="232" class="h1">What component should genie make today?</text>
  <text x="188" y="264" class="body">Start like Claude Design: pick context first, then generate. But the output is a harness-native card grid, not a separate design app.</text>

  <rect x="188" y="302" width="780" height="174" rx="30" class="card-strong"/>
  <text x="228" y="354" class="h2">Describe the card, state, or flow...</text>
  <text x="228" y="388" class="body">Example: Generate a settings billing card using our table, alert, and empty-state patterns.</text>
  <rect x="226" y="426" width="132" height="34" rx="17" class="chip"/>
  <text x="292" y="448" text-anchor="middle" class="small">UI kit: app</text>
  <rect x="370" y="426" width="152" height="34" rx="17" class="chip"/>
  <text x="446" y="448" text-anchor="middle" class="small">Blueprint: cards</text>
  <rect x="534" y="426" width="160" height="34" rx="17" class="chip"/>
  <text x="614" y="448" text-anchor="middle" class="small">Route: Sonnet high</text>
  <rect x="820" y="420" width="108" height="42" rx="21" class="accent"/>
  <text x="874" y="447" text-anchor="middle" class="on-accent" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="750">Conjure</text>

  <rect x="992" y="302" width="256" height="174" rx="30" class="panel"/>
  <text x="1022" y="340" class="h2">Why this option</text>
  <text x="1022" y="370" class="body">Best first-run UX. It teaches</text>
  <text x="1022" y="390" class="body">genie's mental model before</text>
  <text x="1022" y="410" class="body">people hit a complex grid.</text>
  <rect x="1022" y="434" width="126" height="26" rx="13" class="soft"/>
  <text x="1085" y="452" text-anchor="middle" class="tiny">PROMPT FIRST</text>

  <text x="188" y="542" class="h2">Start with a blueprint</text>
  <rect x="188" y="574" width="174" height="108" rx="24" class="card"/>
  <text x="214" y="612" class="h3">Prototype</text>
  <text x="214" y="638" class="body">Interactive component</text>
  <text x="214" y="658" class="body">states and flows</text>
  <rect x="388" y="574" width="174" height="108" rx="24" class="card"/>
  <text x="414" y="612" class="h3">Wireframe</text>
  <text x="414" y="638" class="body">Fast structure before</text>
  <text x="414" y="658" class="body">visual polish</text>
  <rect x="588" y="574" width="174" height="108" rx="24" class="card"/>
  <text x="614" y="612" class="h3">Card grid</text>
  <text x="614" y="638" class="body">Many variants in one</text>
  <text x="614" y="658" class="body">preview surface</text>
  <rect x="788" y="574" width="174" height="108" rx="24" class="card"/>
  <text x="814" y="612" class="h3">Blank</text>
  <text x="814" y="638" class="body">Bring your own brief</text>
  <text x="814" y="658" class="body">and kit context</text>

  <rect x="992" y="534" width="256" height="148" rx="24" class="card"/>
  <text x="1022" y="572" class="h2">UI kit picker</text>
  <text x="1022" y="600" class="body">Search, create, star, and bind</text>
  <text x="1022" y="620" class="body">a kit before generation.</text>
  <rect x="1022" y="640" width="150" height="26" rx="13" class="chip"/>
  <text x="1097" y="658" text-anchor="middle" class="small">Create UI kit</text>

  <rect x="188" y="724" width="1060" height="142" rx="28" class="panel"/>
  <text x="220" y="762" class="h2">Recent projects</text>
  <rect x="1014" y="742" width="90" height="30" rx="15" class="chip"/>
  <text x="1059" y="762" text-anchor="middle" class="small">List</text>
  <rect x="1114" y="742" width="98" height="30" rx="15" class="chip"/>
  <text x="1163" y="762" text-anchor="middle" class="small">Thumbs</text>
  <line x1="220" y1="788" x2="1212" y2="788" class="line" stroke-width="2"/>
  <text x="220" y="818" class="mono">Billing settings card pack</text>
  <text x="640" y="818" class="small">Viewed 12m ago</text>
  <text x="820" y="818" class="small">UI kit: app</text>
  <text x="1044" y="818" class="small">3 pages</text>
  <line x1="220" y1="836" x2="1212" y2="836" class="line" stroke-width="2"/>
  <text x="220" y="858" class="mono">Onboarding empty-state variants</text>
  <text x="640" y="858" class="small">Viewed 1h ago</text>
  <text x="820" y="858" class="small">UI kit: marketing</text>
  <text x="1044" y="858" class="small">5 pages</text>

  <text x="188" y="918" class="tiny">Hallmark stamp: Command Home / N13 / Ft5 / critique: strongest onboarding and library UX; slower for deep refinement.</text>
</svg>
