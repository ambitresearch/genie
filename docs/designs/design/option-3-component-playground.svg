  <text x="404" y="746" class="h2">Refine composer</text>
  <text x="404" y="776" class="body">Use comments 1 and 2: make payment status scannable, add disabled invoice action state.</text>
  <rect x="848" y="762" width="112" height="36" rx="18" class="accent"/>
  <text x="904" y="786" text-anchor="middle" class="on-accent" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="750">Refine</text>

