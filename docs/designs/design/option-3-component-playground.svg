  <text x="1124" y="768" class="body">remains inspectable; debug info</text>
  <text x="1124" y="788" class="body">is one click away.</text>

  <text x="54" y="918" class="tiny">Hallmark stamp: Review Studio / N8 / Ft4 / critique: strongest for QA, comments, and approval; less ideal as the default empty start.</text>
