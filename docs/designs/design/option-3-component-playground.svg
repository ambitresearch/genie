  <text x="732" y="516" class="h3">InvoiceRow.tsx</text>
  <line x1="732" y1="548" x2="956" y2="548" class="line" stroke-width="2"/>
  <line x1="732" y1="588" x2="956" y2="588" class="line" stroke-width="2"/>
  <line x1="732" y1="628" x2="956" y2="628" class="line" stroke-width="2"/>
  <circle cx="972" cy="510" r="14" class="accent"/>
  <text x="972" y="515" text-anchor="middle" class="on-accent" font-family="Inter, ui-sans-serif, system-ui" font-size="11" font-weight="700">2</text>

