<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">genie UI option 3 - review studio</title>
  <desc id="desc">A Claude Design-informed genie review workspace centered on preview inspection, page/file navigation, comments, tweaks, validation evidence, and retry/debug states.</desc>
  <metadata>
    Hallmark critique stamp: Macrostructure=Review Studio; Theme=Neutral Audit; Nav=N8 inspection tabs; Footer=Ft4 command footer; Claude Design context=preview toolbar, comments, page selector, debug state.
  </metadata>
  <style>
    :root {
      --bg: oklch(97% 0.018 82);
      --shell: oklch(99% 0.006 82);
      --panel: oklch(94.5% 0.018 82);
      --card: oklch(99.2% 0.004 82);
      --ink: oklch(20% 0.042 252);
      --muted: oklch(48% 0.032 252);
      --faint: oklch(71% 0.022 252);
      --line: oklch(85% 0.018 82);
      --line-strong: oklch(72% 0.032 252);
      --accent: oklch(60% 0.118 42);
      --accent-soft: oklch(91% 0.046 42);
      --green: oklch(58% 0.105 152);
      --blue: oklch(54% 0.088 252);
      --shadow: oklch(24% 0.032 252 / 0.12);
      --mono: "SFMono-Regular", "JetBrains Mono", ui-monospace, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }
    .bg { fill: var(--bg); }
    .shell { fill: var(--shell); stroke: var(--line); }
    .panel { fill: var(--panel); stroke: var(--line); }
    .card { fill: var(--card); stroke: var(--line); }
    .card-strong { fill: var(--card); stroke: var(--line-strong); }
    .soft { fill: var(--accent-soft); stroke: var(--accent); }
    .accent { fill: var(--accent); }
    .ink { fill: var(--ink); }
    .muted { fill: var(--muted); }
    .faint { fill: var(--faint); }
    .line { stroke: var(--line); }
    .line-strong { stroke: var(--line-strong); }
    .green { fill: var(--green); }
    .blue { fill: var(--blue); }
    .on-accent { fill: var(--shell); }
    .h1 { font: 700 30px var(--serif); fill: var(--ink); }
    .h2 { font: 700 17px var(--sans); fill: var(--ink); }
    .h3 { font: 650 13px var(--sans); fill: var(--ink); letter-spacing: .02em; }
    .body { font: 13px var(--sans); fill: var(--muted); }
    .small { font: 11px var(--sans); fill: var(--muted); }
    .tiny { font: 10px var(--mono); fill: var(--faint); letter-spacing: .02em; }
    .mono { font: 12px var(--mono); fill: var(--muted); }
    .button { fill: var(--card); stroke: var(--line); }
    .chip { fill: var(--shell); stroke: var(--line); }
    .shadow { filter: drop-shadow(0 18px 24px var(--shadow)); }
  </style>

