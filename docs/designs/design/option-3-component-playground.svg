  <text x="1124" y="310" class="small">Action: refine selected card</text>
  <rect x="1100" y="350" width="254" height="120" rx="20" class="card"/>
  <text x="1124" y="382" class="h3">Comment 2</text>
  <text x="1124" y="408" class="body">Invoice row needs disabled and</text>
  <text x="1124" y="428" class="body">loading action evidence.</text>
  <text x="1124" y="452" class="small">Action: add state variant</text>

  <rect x="1100" y="500" width="254" height="162" rx="20" class="card"/>
  <text x="1124" y="532" class="h3">Validation evidence</text>
  <text x="1124" y="558" class="mono">@genie line 1</text>
  <text x="1124" y="582" class="mono">CSP default-src none</text>
  <text x="1124" y="606" class="mono">connect-src none</text>
  <text x="1124" y="630" class="mono">byte match: 3 vehicles</text>

  <rect x="1100" y="690" width="254" height="126" rx="20" class="card"/>
  <text x="1124" y="722" class="h3">Debug and limits</text>
