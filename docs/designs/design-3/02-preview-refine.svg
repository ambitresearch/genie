<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" font-family="Inter, sans-serif">
<!-- Hallmark · genie (lamplight) · genre: atmospheric-editorial · pre-emit critique: P5 H5 E5 S5 R5 V5
     Surface 2 — PREVIEW + REFINE, LAMPLIGHT direction.
     LAYOUT ARCHETYPE: cinematic single-column SPOTLIGHT (vertical descent, no side rails).
     The harness/conjure is a DIM origin band along the top — host territory, ghosted; an amber
     SEAM marks where Claude Code stops and genie's light begins. A beam rakes from the generate
     call down onto a centre STAGE where the one generated component sits lit, selected, measured
     and commented. Detail then DESCENDS one axis — the eight states, a HORIZONTAL refine bench
     (never a right rail), then the code well — light falling off with depth. Top→down, one axis. -->
  <defs>
    <linearGradient id="flame0" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0b483"/><stop offset="0.5" stop-color="#c87c5e"/><stop offset="1" stop-color="#ac5a40"/></linearGradient>
    <linearGradient id="lamp0" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0b483"/><stop offset="1" stop-color="#ac5a40"/></linearGradient>
    <radialGradient id="glowH" cx="0.5" cy="0.42" r="0.7"><stop offset="0" stop-color="#ffcf9e" stop-opacity="0.22"/><stop offset="0.55" stop-color="#f0b483" stop-opacity="0.06"/><stop offset="1" stop-color="#ffcf9e" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowP" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#f0b483" stop-opacity="0.20"/><stop offset="1" stop-color="#f0b483" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowS" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#ffcf9e" stop-opacity="0.16"/><stop offset="1" stop-color="#ffcf9e" stop-opacity="0"/></radialGradient>
    <radialGradient id="vign" cx="0.5" cy="0.40" r="0.82"><stop offset="0" stop-color="#160b09" stop-opacity="0"/><stop offset="0.66" stop-color="#160b09" stop-opacity="0"/><stop offset="1" stop-color="#0e0605" stop-opacity="0.66"/></radialGradient>
    <linearGradient id="smoke0" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#ffcf9e" stop-opacity="0.34"/><stop offset="0.5" stop-color="#f0b483" stop-opacity="0.12"/><stop offset="1" stop-color="#f0b483" stop-opacity="0"/></linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffcf9e" stop-opacity="0.20"/><stop offset="1" stop-color="#ffcf9e" stop-opacity="0"/></linearGradient>
    <filter id="softD" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="10" flood-color="#0b0504" flood-opacity="0.55"/></filter>
    <filter id="liftD" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="18" stdDeviation="40" flood-color="#080403" flood-opacity="0.62"/></filter>
    <filter id="glowf" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#f0a96f" flood-opacity="0.6"/></filter>
  </defs>

  <rect width="1440" height="980" fill="#241310"/>
  <!-- stage bloom — the pool of light the generated component sits in -->
  <ellipse cx="720" cy="316" rx="560" ry="210" fill="url(#glowH)"/>
  <ellipse cx="720" cy="322" rx="380" ry="138" fill="url(#glowP)"/>
  <rect width="1440" height="980" fill="url(#vign)"/>

  <!-- ── top bar — masthead, sits in shadow (sunken, warm rim only) ── -->
  <rect width="1440" height="56" fill="#1d100d"/>
  <line x1="0" y1="56" x2="1440" y2="56" stroke="#46342b"/>
  <line x1="0" y1="55" x2="1440" y2="55" stroke="#6b4f40" stroke-opacity="0.35"/>
  <g transform="translate(28,13)">
    <rect width="30" height="30" rx="9" fill="url(#lamp0)" filter="url(#glowf)"/>
    <path d="M7.5 19.5 q7.5 -11 15 0" fill="none" stroke="#fbe7dd" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M15 4 l1 3 3 1 -3 1 -1 3 -1 -3 -3 -1 3 -1 z" fill="#fbe7dd"/>
    <text x="44" y="15" font-family="Fraunces, Georgia, serif" font-size="19" font-weight="600" fill="#f4ece3">genie</text>
    <text x="92" y="15" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9a8579">· in Claude Code</text>
  </g>
  <g transform="translate(1188,15)"><rect width="224" height="26" rx="13" fill="#1a0d0a" stroke="#5c4538"/><circle cx="18" cy="13" r="5" fill="#5cc47a"/><text x="32" y="17" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#cbb9ac">harness-native · no app to open</text></g>

  <!-- ════ HARNESS ORIGIN BAND — the conjure that produced this, ghosted in the dark ════ -->
  <!-- host territory: dim, receded; genie only reads the seam at its lower edge -->
  <g opacity="0.74">
    <rect x="64" y="72" width="1312" height="92" rx="13" fill="#1d100d" stroke="#3a2820"/>
    <text x="84" y="93" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="0.06em" fill="#6e5b4f">CLAUDE CODE · THE HARNESS · owns the conversation · genie supplies no chat of its own</text>
    <circle cx="90" cy="118" r="5" fill="#7a675b"/>
    <text x="104" y="122" font-family="Inter, sans-serif" font-size="13.5" fill="#cbb9ac">❯ generate a primary button for the Quanta kit — confident and warm</text>
    <text x="104" y="148" font-family="Inter, sans-serif" font-size="12.5" fill="#9a8579">Generated <tspan fill="#cbb9ac">Button / Primary</tspan> — 4 variants, 8 states. On the light table below ↓</text>
    <text x="828" y="122" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#c87c5e">✦ mcp__genie__generate_component</text>
    <text x="828" y="148" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7a675b">↳ wrote 4 files · <tspan fill="#86d7a0">✓ @dsCard ok</tspan></text>
  </g>

  <!-- ── the SEAM — host above, genie's light below ── -->
  <line x1="64" y1="186" x2="1376" y2="186" stroke="#f0b483" stroke-width="1.3" stroke-dasharray="6 5" opacity="0.72"/>
  <g transform="translate(560,176)"><rect width="320" height="21" rx="10.5" fill="#1a0d0a" stroke="#5c4538"/><text x="160" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#9a8579">⌁ the seam · harness above · genie's preview below</text></g>

  <!-- beam: the generate call casts light down onto the stage -->
  <polygon points="690,188 770,188 952,388 488,388" fill="url(#beam)" opacity="0.62"/>

  <!-- ════ STAGE — the one generated component, lit, selected, measured ════ -->
  <!-- secondary controls live up at the right shoulder so the centre axis stays clean -->
  <text x="1376" y="214" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7a675b"><tspan fill="#9a8579">Comments</tspan>   <tspan fill="#f0b483">✦ Tweaks</tspan>   <tspan fill="#7a675b">Code</tspan>   <tspan fill="#7a675b">Present</tspan>   ·   design-default ▾   ⤴ Share</text>

  <text x="720" y="232" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="33" font-weight="500" letter-spacing="-0.018em" fill="#f4ece3">Button / Primary</text>
  <g transform="translate(610,246)">
    <rect width="100" height="22" rx="11" fill="#22304a"/><text x="50" y="16" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#9db4dd">primitives</text>
    <rect x="112" width="104" height="22" rx="11" fill="#22392a"/><text x="164" y="16" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86d7a0">✓ validated</text>
  </g>

  <!-- selection chrome is ink-blue (structure); the button itself emits the warm light -->
  <rect x="528" y="286" width="384" height="112" rx="18" fill="none" stroke="#7d97c9" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.9"/>
  <g fill="#7d97c9"><rect x="524" y="282" width="7" height="7"/><rect x="909" y="282" width="7" height="7"/><rect x="524" y="391" width="7" height="7"/><rect x="909" y="391" width="7" height="7"/></g>
  <ellipse cx="720" cy="342" rx="150" ry="70" fill="url(#glowS)"/>
  <g transform="translate(540,298)" filter="url(#glowf)">
    <rect width="360" height="88" rx="15" fill="url(#flame0)"/>
    <rect x="1" y="1" width="358" height="40" rx="14" fill="#ffffff" fill-opacity="0.16"/>
    <text x="180" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#2a140d">Get started</text>
  </g>
  <!-- selection size readout (ink-blue chrome, not a drafting dimension) -->
  <text x="909" y="416" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9db4dd">360 × 88</text>
  <!-- comment pin + popover -->
  <g transform="translate(905,290)"><circle r="13" fill="url(#lamp0)" filter="url(#glowf)"/><text y="4.5" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#2a140d">1</text></g>
  <g transform="translate(946,300)">
    <rect width="232" height="60" rx="12" fill="#2c1c16" stroke="#46342b" filter="url(#softD)"/>
    <text x="16" y="24" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbb9ac">You</text>
    <text x="48" y="24" font-family="Inter, sans-serif" font-size="11.5" fill="#7a675b">· on the label</text>
    <text x="16" y="44" font-family="Inter, sans-serif" font-size="12.5" fill="#cbb9ac">tighter label, more confident</text>
  </g>
  <!-- a wisp of smoke rising off the lit subject -->
  <path d="M870 300 q14 -34 -4 -64 q-12 -22 6 -44" fill="none" stroke="url(#smoke0)" stroke-width="2.4" stroke-linecap="round" opacity="0.5"/>

  <!-- ════ STATES — descend one notch; eight declared, four lit ════ -->
  <text x="720" y="456" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10.5" letter-spacing="0.08em" fill="#6e5b4f">EIGHT STATES DECLARED · FOUR ON THE STRIP</text>
  <g font-family="'JetBrains Mono', monospace" font-size="10.5">
    <!-- hover -->
    <g transform="translate(360,472)"><rect width="168" height="52" rx="11" fill="#2a1813" stroke="#46342b"/><rect x="34" y="15" width="100" height="22" rx="11" fill="url(#flame0)" filter="url(#glowf)"/><text x="84" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#2a140d">Get started</text></g>
    <text x="444" y="540" text-anchor="middle" fill="#cbb9ac">:hover</text>
    <!-- focus -->
    <g transform="translate(558,472)"><rect width="168" height="52" rx="11" fill="#2a1813" stroke="#46342b"/><rect x="31" y="12" width="106" height="28" rx="13" fill="none" stroke="#7d97c9" stroke-width="1.6"/><rect x="36" y="16" width="96" height="20" rx="10" fill="#c87c5e"/><text x="84" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#2a140d">Get started</text></g>
    <text x="642" y="540" text-anchor="middle" fill="#9db4dd">:focus-visible</text>
    <!-- disabled -->
    <g transform="translate(756,472)"><rect width="168" height="52" rx="11" fill="#2a1813" stroke="#46342b"/><rect x="34" y="15" width="100" height="22" rx="11" fill="#4a3a32"/><text x="84" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#8a7668">Get started</text></g>
    <text x="840" y="540" text-anchor="middle" fill="#7a675b">[disabled]</text>
    <!-- loading -->
    <g transform="translate(954,472)"><rect width="168" height="52" rx="11" fill="#2a1813" stroke="#46342b"/><rect x="34" y="15" width="100" height="22" rx="11" fill="#ac5a40"/><circle cx="72" cy="26" r="2.4" fill="#f0d8c4"/><circle cx="84" cy="26" r="2.4" fill="#f0d8c4" opacity="0.6"/><circle cx="96" cy="26" r="2.4" fill="#f0d8c4" opacity="0.3"/></g>
    <text x="1038" y="540" text-anchor="middle" fill="#cbb9ac">data-loading</text>
  </g>

  <!-- ════ REFINE BENCH — a HORIZONTAL lamplit tray (never a right rail) ════ -->
  <text x="200" y="582" font-family="'JetBrains Mono', monospace" font-size="10.5" letter-spacing="0.08em" fill="#6e5b4f">REFINE · ON THE BENCH</text>
  <g transform="translate(200,592)">
    <rect width="1040" height="98" rx="14" fill="#2c1c16" stroke="#46342b" filter="url(#softD)"/>
    <!-- three sliders laid side by side, horizontally -->
    <g font-family="'JetBrains Mono', monospace" font-size="11">
      <text x="28" y="34" fill="#9a8579">Corner radius</text><text x="214" y="34" text-anchor="end" fill="#cbb9ac">10</text>
      <rect x="28" y="44" width="186" height="4" rx="2" fill="#46342b"/><rect x="28" y="44" width="70" height="4" rx="2" fill="#c87c5e"/><circle cx="98" cy="46" r="6" fill="url(#lamp0)" filter="url(#glowf)"/>
      <text x="270" y="34" fill="#9a8579">Padding</text><text x="456" y="34" text-anchor="end" fill="#cbb9ac">32</text>
      <rect x="270" y="44" width="186" height="4" rx="2" fill="#46342b"/><rect x="270" y="44" width="120" height="4" rx="2" fill="#c87c5e"/><circle cx="390" cy="46" r="6" fill="url(#lamp0)" filter="url(#glowf)"/>
      <text x="512" y="34" fill="#9a8579">Label weight</text><text x="698" y="34" text-anchor="end" fill="#f0b483">700</text>
      <rect x="512" y="44" width="186" height="4" rx="2" fill="#46342b"/><rect x="512" y="44" width="168" height="4" rx="2" fill="#c87c5e"/><circle cx="680" cy="46" r="6" fill="url(#lamp0)" filter="url(#glowf)"/>
    </g>
    <line x1="730" y1="22" x2="730" y2="76" stroke="#46342b"/>
    <text x="754" y="32" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#7a675b">Claude's suggestion</text>
    <text x="754" y="52" font-family="Inter, sans-serif" font-size="12.5" fill="#cbb9ac">weight 600 → 700 · tracking −0.01</text>
    <g transform="translate(754,62)"><rect width="150" height="22" rx="11" fill="#22392a"/><text x="75" y="16" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#86d7a0">✓ validated · @dsCard ok</text></g>
    <!-- apply / discard, on the bench -->
    <g transform="translate(924,30)"><rect width="92" height="38" rx="11" fill="url(#flame0)" filter="url(#glowf)"/><text x="46" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" font-weight="700" fill="#2a140d">✦ Apply</text></g>
    <g transform="translate(924,74)"><text x="46" y="6" text-anchor="middle" font-family="Inter, sans-serif" font-size="11.5" fill="#9a8579">Discard</text></g>
  </g>

  <!-- ════ CODE WELL — deepest, dimmest rung of the descent ════ -->
  <g opacity="0.92">
    <text x="200" y="722" font-family="'JetBrains Mono', monospace" font-size="10.5" letter-spacing="0.08em" fill="#6e5b4f">CODE · Button.tsx · every value references a token, never an inline hex</text>
    <rect x="200" y="732" width="1040" height="172" rx="13" fill="#221511" stroke="#3a2820"/>
    <line x1="244" y1="732" x2="244" y2="904" stroke="#3a2820"/>
    <g font-family="'JetBrains Mono', monospace" font-size="12.5">
      <g fill="#5c4538" text-anchor="end">
        <text x="232" y="762">1</text><text x="232" y="786">2</text><text x="232" y="810">3</text><text x="232" y="834">4</text><text x="232" y="858">5</text><text x="232" y="882">6</text>
      </g>
      <text x="262" y="762"><tspan fill="#9db4dd">import</tspan><tspan fill="#cbb9ac"> { tokens } </tspan><tspan fill="#9db4dd">from</tspan><tspan fill="#e0b07e"> "@quanta/_ds_tokens"</tspan></text>
      <text x="262" y="810"><tspan fill="#9db4dd">export const</tspan><tspan fill="#86d7a0"> Button</tspan><tspan fill="#cbb9ac"> = styled.button`</tspan></text>
      <text x="290" y="834"><tspan fill="#cbb9ac">background: </tspan><tspan fill="#e0b07e">${tokens.clay500}</tspan><tspan fill="#cbb9ac">;</tspan></text>
      <text x="290" y="858"><tspan fill="#cbb9ac">border-radius: </tspan><tspan fill="#e0b07e">${tokens.radius10}</tspan><tspan fill="#cbb9ac">;</tspan></text>
      <text x="290" y="882"><tspan fill="#cbb9ac">font-weight: </tspan><tspan fill="#e0b07e">${tokens.weight700}</tspan><tspan fill="#cbb9ac">;  </tspan><tspan fill="#6e5b4f">/* refined just now */</tspan></text>
    </g>
    <g transform="translate(1040,748)"><rect width="176" height="24" rx="12" fill="#1a0d0a" stroke="#5c4538"/><circle cx="16" cy="12" r="4" fill="#5cc47a"/><text x="30" y="16" font-family="'JetBrains Mono', monospace" font-size="10" fill="#9a8579">live · regenerates on apply</text></g>
  </g>

  <!-- footer -->
  <text x="64" y="958" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#9a8579">genie · preview + refine · the component on the light table · surface 2 / 4</text>
  <text x="1376" y="958" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#7a675b">Lamplight · spotlight layout</text>
</svg>
