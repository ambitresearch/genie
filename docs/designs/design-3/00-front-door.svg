<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" font-family="Inter, sans-serif">
<!-- Hallmark · genie (lamplight) · genre: atmospheric-editorial · pre-emit critique: P5 H5 E5 S5 R5 V5
     Surface 0 — THE FRONT DOOR (empty / generate state), LAMPLIGHT direction.
     LAYOUT ARCHETYPE: cinematic single-column spotlight. Drenched warm-dark oxblood;
     light falls off with distance (vignette). ONE lit focus — the prompt box is the
     lamp. Blueprints descend into a dim CONTACT-SHEET filmstrip (only the centre slide
     catches light). Recent kits sit in the deepest shadow as embers. Fraunces serif,
     amber bloom + warm rim-light (never white), smoke curling into the dark. -->
  <defs>
    <linearGradient id="flame0" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0b483"/><stop offset="0.5" stop-color="#c87c5e"/><stop offset="1" stop-color="#ac5a40"/></linearGradient>
    <linearGradient id="lamp0" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0b483"/><stop offset="1" stop-color="#ac5a40"/></linearGradient>
    <radialGradient id="glowH" cx="0.5" cy="0.42" r="0.7"><stop offset="0" stop-color="#ffcf9e" stop-opacity="0.22"/><stop offset="0.55" stop-color="#f0b483" stop-opacity="0.06"/><stop offset="1" stop-color="#ffcf9e" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowP" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#f0b483" stop-opacity="0.20"/><stop offset="1" stop-color="#f0b483" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowS" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#ffcf9e" stop-opacity="0.16"/><stop offset="1" stop-color="#ffcf9e" stop-opacity="0"/></radialGradient>
    <radialGradient id="vign" cx="0.5" cy="0.40" r="0.82"><stop offset="0" stop-color="#160b09" stop-opacity="0"/><stop offset="0.66" stop-color="#160b09" stop-opacity="0"/><stop offset="1" stop-color="#0e0605" stop-opacity="0.66"/></radialGradient>
    <linearGradient id="smoke0" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#ffcf9e" stop-opacity="0.34"/><stop offset="0.5" stop-color="#f0b483" stop-opacity="0.12"/><stop offset="1" stop-color="#f0b483" stop-opacity="0"/></linearGradient>
    <filter id="softD" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="10" flood-color="#0b0504" flood-opacity="0.55"/></filter>
    <filter id="liftD" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="18" stdDeviation="40" flood-color="#080403" flood-opacity="0.62"/></filter>
    <filter id="glowf" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#f0a96f" flood-opacity="0.6"/></filter>
  </defs>

  <rect width="1440" height="980" fill="#241310"/>
  <!-- hero lamp bloom — the warmth pooling around the prompt -->
  <ellipse cx="720" cy="350" rx="680" ry="330" fill="url(#glowH)"/>
  <ellipse cx="720" cy="392" rx="520" ry="186" fill="url(#glowP)"/>
  <!-- cinematic vignette: light falls off toward the edges -->
  <rect width="1440" height="980" fill="url(#vign)"/>

  <!-- ── top bar — sits in shadow (sunken, warm rim only) ── -->
  <rect width="1440" height="56" fill="#1d100d"/>
  <line x1="0" y1="56" x2="1440" y2="56" stroke="#46342b"/>
  <line x1="0" y1="55" x2="1440" y2="55" stroke="#6b4f40" stroke-opacity="0.35"/>
  <g transform="translate(28,13)">
    <rect width="30" height="30" rx="9" fill="url(#lamp0)" filter="url(#glowf)"/>
    <path d="M7.5 19.5 q7.5 -11 15 0" fill="none" stroke="#fbe7dd" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M15 4 l1 3 3 1 -3 1 -1 3 -1 -3 -3 -1 3 -1 z" fill="#fbe7dd"/>
    <text x="44" y="15" font-family="Fraunces, Georgia, serif" font-size="19" font-weight="600" fill="#f4ece3">genie</text>
    <text x="92" y="15" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9a8579">· in Claude Code</text>
  </g>
  <g transform="translate(1188,15)"><rect width="224" height="26" rx="13" fill="#1a0d0a" stroke="#5c4538"/><circle cx="18" cy="13" r="5" fill="#5cc47a"/><text x="32" y="17" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#cbb9ac">harness-native · no app to open</text></g>

  <!-- faint smoke curling up into the dark off the lamp -->
  <path d="M640 150 C636 120 660 112 652 84 C646 60 672 50 666 26" fill="none" stroke="url(#smoke0)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- ════ HERO — the one lit focus ════ -->
  <text x="720" y="214" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="58" font-weight="500" letter-spacing="-0.018em" fill="#f4ece3">Your wish is my command.</text>
  <text x="720" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#cbb9ac">Describe a component. genie conjures it against your UI kit, right here in your editor.</text>

  <!-- the prompt box — lit, lifted into the lamplight -->
  <g transform="translate(360,294)">
    <rect width="720" height="150" rx="18" fill="#33211b" stroke="#5c4538" filter="url(#liftD)"/>
    <line x1="22" y1="1" x2="698" y2="1" stroke="#ffcf9e" stroke-width="1.4" stroke-opacity="0.32"/>
    <text x="32" y="52" font-family="Inter, sans-serif" font-size="19" fill="#f4ece3">a pricing card with three tiers and a highlighted</text>
    <text x="32" y="80" font-family="Inter, sans-serif" font-size="19" fill="#9a8579">middle plan<tspan fill="#f0b483">|</tspan></text>
    <line x1="20" y1="100" x2="700" y2="100" stroke="#46342b"/>
    <!-- UI kit selector -->
    <g transform="translate(24,112)"><rect width="220" height="32" rx="9" fill="#241310" stroke="#46342b"/>
      <circle cx="20" cy="16" r="7" fill="url(#lamp0)"/><text x="36" y="14" font-family="Inter, sans-serif" font-size="10" fill="#9a8579">UI KIT</text><text x="36" y="26" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f4ece3">Quanta · 30 components ▾</text></g>
    <!-- model selector -->
    <g transform="translate(256,112)"><rect width="180" height="32" rx="9" fill="#241310" stroke="#46342b"/>
      <text x="14" y="14" font-family="Inter, sans-serif" font-size="10" fill="#9a8579">MODEL</text><text x="14" y="26" font-family="'JetBrains Mono', monospace" font-size="11.5" font-weight="600" fill="#f4ece3">design-default ▾</text></g>
    <!-- Conjure — the lamp emits -->
    <g transform="translate(596,112)" filter="url(#glowf)"><rect width="100" height="32" rx="9" fill="url(#flame0)"/><line x1="10" y1="1.5" x2="90" y2="1.5" stroke="#ffe0c8" stroke-width="1.1" stroke-opacity="0.85"/><text x="44" y="21" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#2a140d">Conjure</text><path d="M73 18 C75 13 80 14 80 17 C80 20 84 20 86 16" fill="none" stroke="#2a140d" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.85"/></g>
  </g>

  <!-- ════ blueprints — a dim CONTACT SHEET, only the centre slide lit ════ -->
  <text x="720" y="506" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#9a8579">…or start from a blueprint</text>
  <rect x="360" y="524" width="720" height="156" rx="16" fill="#1d100d" stroke="#3a2820"/>
  <line x1="376" y1="525" x2="1064" y2="525" stroke="#6b4f40" stroke-opacity="0.22"/>

  <!-- slide 1 · Button (unlit) -->
  <g transform="translate(368,548)"><rect width="128" height="100" rx="10" fill="#2a1813" stroke="#46342b"/>
    <g transform="translate(31,24)"><rect width="66" height="26" rx="7" fill="#8a5340"/><text x="33" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#d8c4b8">Button</text></g>
    <text x="64" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" font-weight="600" fill="#cbb9ac">Button</text>
    <text x="64" y="89" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8.5" letter-spacing="0.1em" fill="#7a675b">PRIMITIVE</text></g>
  <!-- slide 2 · Card (unlit) -->
  <g transform="translate(512,548)"><rect width="128" height="100" rx="10" fill="#2a1813" stroke="#46342b"/>
    <g transform="translate(34,20)"><rect width="60" height="38" rx="6" fill="#241310" stroke="#46342b"/><rect x="8" y="8" width="30" height="4" rx="2" fill="#7a675b"/><rect x="8" y="17" width="44" height="3" rx="1.5" fill="#46342b"/><rect x="8" y="25" width="24" height="8" rx="4" fill="#7d97c9"/></g>
    <text x="64" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" font-weight="600" fill="#cbb9ac">Card</text>
    <text x="64" y="89" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8.5" letter-spacing="0.1em" fill="#7a675b">COMPONENT</text></g>
  <!-- slide 3 · Pricing — THE LIT SLIDE (rhymes with the prompt) -->
  <ellipse cx="720" cy="598" rx="118" ry="74" fill="url(#glowS)"/>
  <g transform="translate(656,548)"><rect width="128" height="100" rx="10" fill="#33211b" stroke="#6b4f40" filter="url(#softD)"/><line x1="12" y1="1" x2="116" y2="1" stroke="#ffcf9e" stroke-width="1.2" stroke-opacity="0.4"/>
    <g transform="translate(22,22)"><rect width="24" height="40" rx="4" fill="#241310" stroke="#5c4538"/>
      <rect x="29" y="-4" width="26" height="48" rx="4" fill="#2a1813" stroke="#f0b483" stroke-width="1.4"/><rect x="29" y="-4" width="26" height="9" rx="4" fill="url(#flame0)"/>
      <rect x="60" width="24" height="40" rx="4" fill="#241310" stroke="#5c4538"/></g>
    <text x="64" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" font-weight="600" fill="#f4ece3">Pricing</text>
    <text x="64" y="89" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8.5" letter-spacing="0.1em" fill="#f0b483">PATTERN</text></g>
  <!-- slide 4 · Dashboard (unlit) -->
  <g transform="translate(800,548)"><rect width="128" height="100" rx="10" fill="#2a1813" stroke="#46342b"/>
    <g transform="translate(26,22)"><rect width="76" height="40" rx="5" fill="#241310" stroke="#46342b"/>
      <rect x="6" y="6" width="15" height="28" rx="3" fill="#2a1813" stroke="#46342b"/>
      <rect x="27" y="6" width="43" height="7" rx="2.5" fill="#2a1813" stroke="#46342b"/>
      <rect x="27" y="18" width="20" height="16" rx="2.5" fill="#2a1813" stroke="#46342b"/>
      <rect x="50" y="18" width="20" height="16" rx="2.5" fill="#7d97c9" opacity="0.28"/></g>
    <text x="64" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" font-weight="600" fill="#cbb9ac">Dashboard</text>
    <text x="64" y="89" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8.5" letter-spacing="0.1em" fill="#7a675b">LAYOUT</text></g>
  <!-- slide 5 · Email (unlit) -->
  <g transform="translate(944,548)"><rect width="128" height="100" rx="10" fill="#2a1813" stroke="#46342b"/>
    <g transform="translate(32,24)"><rect width="64" height="40" rx="5" fill="#241310" stroke="#46342b"/>
      <path d="M3 5 L32 25 L61 5" fill="none" stroke="#7a675b" stroke-width="2" stroke-linejoin="round"/>
      <path d="M3 5 L32 25 L61 5" fill="none" stroke="#8a5340" stroke-width="1.4" stroke-linejoin="round" stroke-dasharray="0 17 13 99"/></g>
    <text x="64" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12.5" font-weight="600" fill="#cbb9ac">Email</text>
    <text x="64" y="89" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8.5" letter-spacing="0.1em" fill="#7a675b">CAMPAIGN</text></g>

  <!-- ════ recent kits — embers in the deepest shadow ════ -->
  <g transform="translate(360,724)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="#46342b"/>
    <text x="0" y="30" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="0.04em" fill="#9a8579">RECENT KITS</text>
    <text x="720" y="30" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7a675b">synced via /genie-sync</text>
    <g transform="translate(0,44)"><rect width="720" height="44" rx="10" fill="#1d100d" stroke="#3a2820"/>
      <rect x="14" y="11" width="22" height="22" rx="6" fill="url(#lamp0)"/>
      <text x="48" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#e7dad0">Quanta UI Kit</text>
      <text x="280" y="28" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9a8579">30 components · 4 groups</text>
      <g transform="translate(560,11)"><rect width="86" height="22" rx="11" fill="#22392a"/><text x="12" y="15" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#86d7a0">✓ default</text></g>
      <text x="700" y="28" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7a675b">4h ago</text></g>
    <g transform="translate(0,96)"><rect width="720" height="44" rx="10" fill="#1d100d" stroke="#3a2820"/>
      <rect x="14" y="11" width="22" height="22" rx="6" fill="#7d97c9"/>
      <text x="48" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#e7dad0">Marketing Site Kit</text>
      <text x="280" y="28" font-family="'JetBrains Mono', monospace" font-size="11" fill="#9a8579">12 components · 2 groups</text>
      <text x="700" y="28" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7a675b">2d ago</text></g>
  </g>

  <text x="24" y="958" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#9a8579">genie · front door · one lamp lit in the dark · surface 0 / 4</text>
  <text x="1416" y="958" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11.5" fill="#7a675b">Lamplight · spotlight layout</text>
</svg>
