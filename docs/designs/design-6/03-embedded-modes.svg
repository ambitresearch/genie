  <rect x="60" y="296" width="180" height="8" rx="2" fill="#dad7d2"/>
  <rect x="60" y="312" width="280" height="6" rx="2" fill="#eae6df"/>
  <rect x="60" y="324" width="220" height="6" rx="2" fill="#eae6df"/>
  <rect x="48" y="372" width="380" height="80" rx="5" fill="rgba(255,255,255,0.6)" stroke="#dad7d2"/>
  <rect x="60" y="388" width="140" height="8" rx="2" fill="#dad7d2"/>
  <rect x="60" y="404" width="260" height="6" rx="2" fill="#eae6df"/>
