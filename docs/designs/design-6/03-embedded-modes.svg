  <text x="516" y="548" font-size="11" fill="#423f3d">Navigation Bar</text>
  <text x="700" y="548" font-size="11" fill="#75716d">COMPONENT</text>
  <line x1="516" y1="556" x2="924" y2="556" stroke="#dad7d2" stroke-width="1"/>
  <!-- standalone label -->
