<!-- Warm Instrument · design-6 · genre: editorial-precision
     surface: 03-embedded-modes · three display modes
     pre-emit critique: P5 H5 E5 S5 R5 V5
     Clay rule: @genie marker + Conjure/Apply buttons. System fonts only (CSP constraint). -->
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080"
     font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">

  <!-- ── Background ──────────────────────────────────────────────── -->
  <rect width="1440" height="1080" fill="#faf8f5"/>

  <!-- ── CSP constraint strip ──────────────────────────────────────── -->
  <rect width="1440" height="36" fill="#f3f0ea"/>
  <line x1="0" y1="36" x2="1440" y2="36" stroke="#dad7d2" stroke-width="1"/>
  <text x="24" y="22"
        font-family="'JetBrains Mono', ui-monospace, Menlo, monospace"
        font-size="10" font-weight="600" fill="#75716d" letter-spacing="0.04em">CSP CONSTRAINT</text>
  <text x="156" y="22"
        font-family="'JetBrains Mono', ui-monospace, Menlo, monospace"
        font-size="10" fill="#423f3d">EMBEDDED: default-src 'none' · connect-src 'none' · system fonts only</text>
  <text x="900" y="22"
        font-family="'JetBrains Mono', ui-monospace, Menlo, monospace"
        font-size="10" fill="#75716d">STANDALONE: full brand fonts · external connect allowed</text>
  <rect x="1340" y="8" width="88" height="20" rx="4" fill="#fae2d8"/>
  <text x="1384" y="22"
        font-family="'JetBrains Mono', ui-monospace, Menlo, monospace"
        font-size="9" font-weight="700" fill="#c87c5e" text-anchor="middle">CLAY NEVER DEFERS</text>

  <!-- ── Top bar ──────────────────────────────────────────────────── -->
  <rect y="36" width="1440" height="56" fill="#faf8f5"/>
  <line x1="0" y1="92" x2="1440" y2="92" stroke="#dad7d2" stroke-width="1"/>
  <text x="32" y="70" font-family="Georgia, 'Times New Roman', ui-serif, serif"
        font-size="19" font-weight="600" letter-spacing="-0.01em" fill="#171614">genie</text>
  <text x="148" y="69" font-size="14" fill="#75716d">Generate</text>
  <text x="228" y="69" font-size="14" fill="#75716d">Browse</text>
  <text x="302" y="69" font-size="14" font-weight="500" fill="#171614">Embedded</text>
  <line x1="302" y1="91" x2="365" y2="91" stroke="#171614" stroke-width="2"/>
  <rect x="1352" y="52" width="24" height="24" rx="12" fill="#eae6df"/>
  <text x="1364" y="69" font-size="12" font-weight="600" fill="#75716d" text-anchor="middle">RG</text>

  <!-- ── Section heading ──────────────────────────────────────────── -->
  <text x="32" y="132" font-size="22" font-weight="600" fill="#171614">Embedded Modes</text>
  <text x="32" y="154" font-size="14" fill="#75716d">
        Genie adapts to three display contexts. Clay identity persists across all of them.</text>
  <line x1="32" y1="168" x2="1408" y2="168" stroke="#dad7d2" stroke-width="1"/>

  <!-- ── Column labels ──────────────────────────────────────────────── -->
  <text x="236" y="196" font-size="13" font-weight="600" fill="#171614"
        text-anchor="middle">Inline</text>
  <text x="236" y="212" font-size="11" fill="#75716d" text-anchor="middle">Compact card in host page</text>

  <text x="720" y="196" font-size="13" font-weight="600" fill="#171614"
        text-anchor="middle">Fullscreen</text>
  <text x="720" y="212" font-size="11" fill="#75716d" text-anchor="middle">Full-window takeover</text>

  <text x="1204" y="196" font-size="13" font-weight="600" fill="#171614"
        text-anchor="middle">Picture-in-Picture</text>
  <text x="1204" y="212" font-size="11" fill="#75716d" text-anchor="middle">Floating persistent widget</text>

