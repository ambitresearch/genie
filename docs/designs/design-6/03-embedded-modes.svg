  <rect x="48" y="472" width="380" height="44" rx="8" fill="#faf8f5"/>
  <rect x="48" y="496" width="380" height="20" fill="#faf8f5"/>
  <!-- @genie marker — CLAY -->
  <text x="68" y="498"
