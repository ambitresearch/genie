  <rect x="496" y="256" width="448" height="20" fill="#faf8f5"/>
  <line x1="496" y1="276" x2="944" y2="276" stroke="#dad7d2" stroke-width="1"/>
  <text x="516" y="256" font-family="Georgia, 'Times New Roman', ui-serif, serif"
