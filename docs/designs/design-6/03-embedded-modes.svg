  <text x="105" y="668" font-size="9" font-weight="600" fill="#c87c5e"
        text-anchor="middle">clay persists</text>

  <!-- ══════════════════════════════════════════════════════════════════
       COLUMN 2: FULLSCREEN MODE (480..960)
  ══════════════════════════════════════════════════════════════════ -->
  <!-- fullscreen chrome -->
