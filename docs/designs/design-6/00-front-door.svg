<!-- Warm Instrument · design-6 · genre: editorial-precision
     surface: 00-front-door · empty/generate state
     pre-emit critique: P5 H5 E5 S5 R5 V5
     Clay rule: accent only on Conjure button + generate cursor. All chrome ink/neutral. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980"
     font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">

  <!-- ── Background ──────────────────────────────────────────────── -->
  <rect width="1440" height="980" fill="#faf8f5"/>

