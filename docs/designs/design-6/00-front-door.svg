  <text x="720" y="505" font-size="12" fill="#75716d">Link · Icon · Divider</text>
  <text x="920" y="505" font-size="12" fill="#75716d">5 days ago</text>
  <line x1="356" y1="517" x2="1084" y2="517" stroke="#dad7d2" stroke-width="0.5"/>

