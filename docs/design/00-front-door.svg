<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" font-family="Inter, system-ui, sans-serif">
<!-- Hallmark · genie (hybrid) · genre: editorial-modern · pre-emit critique: P5 H5 E5 S5 R5 V5
     Surface 0 — THE FRONT DOOR (empty / generate state). genie's first impression.
     Big serif prompt ("Your wish is my command."), the prompt box (UI-kit + model +
     Conjure), starter blueprints, recent kits. Carries the harness-native pitch. Premium craft
     (lit edges, gilt gradient). Modeled on Claude Design's "What will you design today?" -->
  <defs>
    <linearGradient id="lamp0" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#c87c5e"/><stop offset="1" stop-color="#ac5a40"/></linearGradient>
    <linearGradient id="gilt0" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#cd835f"/><stop offset="0.5" stop-color="#bd6e4f"/><stop offset="1" stop-color="#ab5b41"/></linearGradient>
    <radialGradient id="glow0" cx="0.5" cy="0.4" r="0.7"><stop offset="0" stop-color="#ffe9dd" stop-opacity="0.7"/><stop offset="1" stop-color="#faf8f5" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="#ffd9be" stop-opacity="0.42"/><stop offset="1" stop-color="#ffd9be" stop-opacity="0"/></radialGradient>
    <linearGradient id="smoke0" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#ac5a40" stop-opacity="0.55"/><stop offset="0.45" stop-color="#c87c5e" stop-opacity="0.28"/><stop offset="1" stop-color="#c87c5e" stop-opacity="0"/></linearGradient>
    <filter id="soft0" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#171614" flood-opacity="0.08"/></filter>
    <filter id="lift0" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="28" flood-color="#171614" flood-opacity="0.10"/></filter>
    <filter id="gilt0f" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="3" stdDeviation="10" flood-color="#ab5b41" flood-opacity="0.26"/></filter>
  </defs>

  <rect width="1440" height="980" fill="#faf8f5"/>
  <!-- soft warm glow behind the prompt (the "lamp" warmth) -->
  <ellipse cx="720" cy="340" rx="640" ry="300" fill="url(#glow0)"/>
  <!-- lamplight pool — warm halo spilling around the prompt box -->
  <ellipse cx="720" cy="368" rx="520" ry="182" fill="url(#glow1)"/>

  <!-- ── top bar ── -->
  <rect width="1440" height="56" fill="#f3f0ea"/>
  <line x1="0" y1="0" x2="1440" y2="0" stroke="#fdfcf9"/><line x1="0" y1="56" x2="1440" y2="56" stroke="#dad7d2"/>
  <g transform="translate(28,13)">
    <rect width="30" height="30" rx="8" fill="url(#lamp0)" filter="url(#soft0)"/>
    <path d="M7.5 19.5 q7.5 -11 15 0" fill="none" stroke="#faf8f5" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M15 4 l1 3 3 1 -3 1 -1 3 -1 -3 -3 -1 3 -1 z" fill="#faf8f5"/>
    <text x="44" y="15" font-family="Newsreader, Georgia, serif" font-size="19" font-weight="600" fill="#171614">genie</text>
    <text x="92" y="15" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">· in Claude Code</text>
  </g>
  <!-- harness-native badge, top-right -->
  <g transform="translate(1188,15)"><rect width="224" height="26" rx="13" fill="#171614"/><circle cx="18" cy="13" r="5" fill="#348f4f"/><text x="32" y="17" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#faf8f5">harness-native · no app to open</text></g>

  <!-- ════ HERO ════ -->
  <g transform="translate(0,150)">
    <!-- big serif prompt -->
    <text x="720" y="60" text-anchor="middle" font-family="Newsreader, Georgia, serif" font-size="58" font-weight="500" letter-spacing="-0.02em" fill="#171614">Your wish is my command.</text>
    <text x="720" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#423f3d">Describe a component. genie conjures it against your UI kit, right here in your editor.</text>

    <!-- the prompt box (lit, lifted) -->
    <g transform="translate(360,140)">
      <rect width="720" height="148" rx="18" fill="#faf8f5" stroke="#e3ded4" filter="url(#lift0)"/>
      <line x1="20" y1="1" x2="700" y2="1" stroke="#ffffff" stroke-width="1.5"/>
      <!-- prompt text -->
      <text x="32" y="52" font-family="Inter, sans-serif" font-size="19" fill="#171614">a pricing card with three tiers and a highlighted</text>
      <text x="32" y="80" font-family="Inter, sans-serif" font-size="19" fill="#75716d">middle plan<tspan fill="#c87c5e">|</tspan></text>
      <!-- controls row -->
      <line x1="20" y1="100" x2="700" y2="100" stroke="#eae6df"/>
      <!-- design system selector -->
      <g transform="translate(24,112)"><rect width="220" height="32" rx="9" fill="#f3f0ea" stroke="#dad7d2"/><rect width="220" height="32" rx="9" fill="none"/><line x1="10" y1="1" x2="210" y2="1" stroke="#ffffff"/>
        <circle cx="20" cy="16" r="7" fill="url(#gilt0)"/><text x="36" y="14" font-family="Inter, sans-serif" font-size="10" fill="#75716d">UI KIT</text><text x="36" y="26" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#171614">Quanta · 30 components ▾</text></g>
      <!-- model selector -->
      <g transform="translate(256,112)"><rect width="180" height="32" rx="9" fill="#f3f0ea" stroke="#dad7d2"/><line x1="10" y1="1" x2="170" y2="1" stroke="#ffffff"/>
        <text x="14" y="14" font-family="Inter, sans-serif" font-size="10" fill="#75716d">MODEL</text><text x="14" y="26" font-family="JetBrains Mono, monospace" font-size="11.5" font-weight="600" fill="#171614">design-default ▾</text></g>
      <!-- submit (gilt, lit) — Conjure with a wisp -->
      <g transform="translate(596,112)" filter="url(#gilt0f)"><rect width="100" height="32" rx="9" fill="url(#gilt0)"/><line x1="10" y1="1.5" x2="90" y2="1.5" stroke="#e6b39c" stroke-width="1.1" stroke-opacity="0.8"/><text x="44" y="21" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#faf8f5">Conjure</text><path d="M73 18 C75 13 80 14 80 17 C80 20 84 20 86 16" fill="none" stroke="#faf8f5" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.92"/></g>
    </g>

    <!-- ── starter blueprints ── -->
    <text x="720" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#75716d">…or start from a blueprint</text>
    <g transform="translate(360,378)">
      <!-- primitive · button -->
      <g><rect width="132" height="120" rx="14" fill="#faf8f5" stroke="#e3ded4" filter="url(#soft0)"/><line x1="10" y1="1" x2="122" y2="1" stroke="#ffffff"/>
        <g transform="translate(30,26)"><rect width="72" height="28" rx="7" fill="url(#gilt0)"/><line x1="8" y1="1" x2="64" y2="1" stroke="#e6b39c" stroke-opacity="0.7"/><text x="36" y="19" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#faf8f5">Button</text></g>
        <text x="66" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#171614">Button</text>
        <text x="66" y="104" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em" fill="#9b9690">PRIMITIVE</text></g>
      <!-- component · card -->
      <g transform="translate(147,0)"><rect width="132" height="120" rx="14" fill="#faf8f5" stroke="#e3ded4" filter="url(#soft0)"/><line x1="10" y1="1" x2="122" y2="1" stroke="#ffffff"/>
        <g transform="translate(36,22)"><rect width="60" height="40" rx="6" fill="#f3f0ea" stroke="#dad7d2"/><rect x="8" y="8" width="30" height="4" rx="2" fill="#c7c3bd"/><rect x="8" y="18" width="44" height="3" rx="1.5" fill="#eae6df"/><rect x="8" y="26" width="24" height="8" rx="4" fill="#345197"/></g>
        <text x="66" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#171614">Card</text>
        <text x="66" y="104" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em" fill="#9b9690">COMPONENT</text></g>
      <!-- pattern · pricing (rhymes with the prompt above) -->
      <g transform="translate(294,0)"><rect width="132" height="120" rx="14" fill="#faf8f5" stroke="#e3ded4" filter="url(#soft0)"/><line x1="10" y1="1" x2="122" y2="1" stroke="#ffffff"/>
        <g transform="translate(22,24)"><rect width="26" height="40" rx="4" fill="#f3f0ea" stroke="#dad7d2"/>
          <rect x="31" y="-4" width="26" height="48" rx="4" fill="#faf8f5" stroke="#cd835f" stroke-width="1.4"/><rect x="31" y="-4" width="26" height="9" rx="4" fill="url(#gilt0)"/>
          <rect x="62" width="26" height="40" rx="4" fill="#f3f0ea" stroke="#dad7d2"/></g>
        <text x="66" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#171614">Pricing</text>
        <text x="66" y="104" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em" fill="#9b9690">PATTERN</text></g>
      <!-- layout · dashboard -->
      <g transform="translate(441,0)"><rect width="132" height="120" rx="14" fill="#faf8f5" stroke="#e3ded4" filter="url(#soft0)"/><line x1="10" y1="1" x2="122" y2="1" stroke="#ffffff"/>
        <g transform="translate(28,24)"><rect width="76" height="42" rx="5" fill="#f3f0ea" stroke="#dad7d2"/>
          <rect x="6" y="6" width="15" height="30" rx="3" fill="#faf8f5" stroke="#dad7d2"/>
          <rect x="27" y="6" width="43" height="8" rx="2.5" fill="#faf8f5" stroke="#dad7d2"/>
          <rect x="27" y="18" width="20" height="18" rx="2.5" fill="#faf8f5" stroke="#dad7d2"/>
          <rect x="50" y="18" width="20" height="18" rx="2.5" fill="#345197" opacity="0.16"/></g>
        <text x="66" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#171614">Dashboard</text>
        <text x="66" y="104" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em" fill="#9b9690">LAYOUT</text></g>
      <!-- campaign · email (envelope) -->
      <g transform="translate(588,0)"><rect width="132" height="120" rx="14" fill="#faf8f5" stroke="#e3ded4" filter="url(#soft0)"/><line x1="10" y1="1" x2="122" y2="1" stroke="#ffffff"/>
        <g transform="translate(34,28)"><rect width="64" height="42" rx="5" fill="#f3f0ea" stroke="#dad7d2"/>
          <path d="M3 5 L32 27 L61 5" fill="none" stroke="#c7c3bd" stroke-width="2" stroke-linejoin="round"/>
          <path d="M3 5 L32 27 L61 5" fill="none" stroke="#cd835f" stroke-width="1.4" stroke-linejoin="round" stroke-dasharray="0 17 13 99"/></g>
        <text x="66" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#171614">Email</text>
        <text x="66" y="104" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em" fill="#9b9690">CAMPAIGN</text></g>
    </g>
  </g>

  <!-- ── recent kits (bottom) ── -->
  <g transform="translate(360,720)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="#dad7d2"/>
    <text x="0" y="32" font-family="Inter, sans-serif" font-size="13" font-weight="600" letter-spacing="0.04em" fill="#75716d">RECENT KITS</text>
    <text x="720" y="32" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">synced via /genie-sync</text>
    <!-- row 1 -->
    <g transform="translate(0,48)"><rect width="720" height="44" rx="10" fill="#faf8f5" stroke="#e3ded4"/><line x1="10" y1="1" x2="710" y2="1" stroke="#ffffff"/>
      <rect x="14" y="11" width="22" height="22" rx="6" fill="url(#gilt0)"/>
      <text x="48" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#171614">Quanta UI Kit</text>
      <text x="280" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">30 components · 4 groups</text>
      <g transform="translate(560,11)"><rect width="86" height="22" rx="11" fill="#d4f1d8"/><text x="12" y="15" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#2a7a42">✓ default</text></g>
      <text x="700" y="28" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">4h ago</text></g>
    <!-- row 2 -->
    <g transform="translate(0,100)"><rect width="720" height="44" rx="10" fill="#faf8f5" stroke="#e3ded4"/><line x1="10" y1="1" x2="710" y2="1" stroke="#ffffff"/>
      <rect x="14" y="11" width="22" height="22" rx="6" fill="#345197"/>
      <text x="48" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#171614">Marketing Site Kit</text>
      <text x="280" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">12 components · 2 groups</text>
      <text x="700" y="28" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#75716d">2d ago</text></g>
  </g>

  <text x="28" y="966" font-family="JetBrains Mono, monospace" font-size="10" fill="#75716d">genie · front door (empty / generate state) · the harness-native pitch · surface 0 / 3</text>
</svg>
