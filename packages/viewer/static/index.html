<!doctype html>
<!--
  M4-03 (DRO-265) — genie preview viewer shell.

  The static entry the Vite viewer (M4-02) serves as the kit root `index.html`.
  It is deliberately a thin, declarative shell: the header + search + empty
  `<main id="grid">`, plus the two static assets. All rendering lives in
  `viewer.js`, which fetches `.genie/manifest.json` and fills the grid.

  Tier: STANDALONE (Vite viewer / file://) — full brand fonts are allowed here
  (the EMBEDDED `ui://genie/grid` tier, M4-06, is system-fonts-only). The
  `genie-standalone` class opts into the brand font stack from tokens.css.

  Identity contract (tokens.css): the clay/gilt accent appears ONLY on
  generate/refine moments. This browse surface is structural, so its chrome
  stays ink/neutral; the wordmark's single clay glyph is the one sanctioned
  accent touch.

  `viewer.js` is loaded as a CLASSIC script (no `type="module"`) — DRO-749
  fix. A module script's relative-path `src` fetch is rejected by the browser
  under `file://` (each `file://` document gets an opaque, distinct origin,
  so the ES module loader's same-origin check fails), verified empirically
  against a real headless-Chromium `file://` navigation before this fix. A
  classic script has no such restriction and runs identically under
  `file://`, the Vite dev server, and inside a sandboxed iframe — required by
  RFC G-5 ("byte-identical across file:// / localhost / ui://",  AGENTS.md
  hard rule 5). See `viewer.js`'s own header for the full writeup.
-->
<html lang="en" class="genie-standalone">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>genie — preview</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__brand">
        <span class="wordmark">genie<span class="wordmark__spark" aria-hidden="true">✦</span></span>
        <span class="app-header__subtitle">preview</span>
      </div>
      <div class="app-header__search">
        <!--
          M4-09 AC4 — `aria-label` directly on the input (not just the
          `<label for="q">` below). Both are harmless together: `aria-label`
          wins the accessible-name computation (WAI-ARIA §5.2.7.5 name-from
          precedence puts `aria-label` ahead of native `<label>`), so the
          visible label becomes redundant-but-harmless rather than
          conflicting — kept because sighted mouse users still get a visible
          "click the label to focus" affordance the aria-label alone can't
          give them.
        -->
        <label class="visually-hidden" for="q">Filter components by name</label>
        <input
          id="q"
          type="search"
          class="search-input"
          placeholder="Filter components…"
          aria-label="Filter components by name"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <!--
        M4-04 (DRO-266) — HMR reload counter (AC6): a debugging read-out of how
        many per-card refreshes have fired this session. Collapsible via a native
        <details> (no JS needed to toggle). Structural chrome only — neutral
        ink/mono, NEVER the clay accent (identity contract: clay marks
        generate/refine moments, not diagnostics). `viewer.js`'s bumpReloadCounter
        writes the live total into #hmr-count (and mirrors it to data-count for
        tests). Static tools (file:// open, embedded ui:// grid) that never
        receive an HMR event simply leave it at 0.
      -->
      <details class="hmr-meter">
        <summary class="hmr-meter__summary">
          HMR
          <span id="hmr-count" class="hmr-meter__count" data-count="0" aria-live="polite">0</span>
        </summary>
        <p class="hmr-meter__detail">
          Per-card reloads since load. Edit a component's preview HTML to see one card
          refresh in place.
        </p>
      </details>
    </header>

    <main id="grid" class="app-grid" aria-live="polite">
      <!-- viewer.js renders group sections + cards here. -->
    </main>

    <script src="./viewer.js"></script>
  </body>
</html>
