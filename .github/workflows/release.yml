          test "$promoted_digest" = "$BUILD_DIGEST"

      - name: Verify promoted release tag
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          for tag in "$VERSION" latest; do
            published_digest=$(docker buildx imagetools inspect \
              "docker.io/ambitresearch/genie:$tag" \
              | awk '$1 == "Digest:" { print $2; exit }')
            test "$published_digest" = "$BUILD_DIGEST"
          done

  # GitHub's immutable-release setting rejects asset uploads after publication.
  # Release Please therefore creates drafts; this job publishes them only after
  # every applicable package, bundle, and container path has succeeded and its
  # live registry/release evidence is present.
  finalize-releases:
    name: finalize verified GitHub releases
    needs:
      - release-please
      - publish-server
      - publish-viewer
      - publish-mcpb
      - docker-publish-ghcr
      - docker-publish-dockerhub
    if: >-
      always() &&
      (needs.release-please.outputs.server_released == 'true' ||
      needs.release-please.outputs.viewer_released == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Require every applicable publish job
        env:
          SERVER_RELEASED: ${{ needs.release-please.outputs.server_released }}
          VIEWER_RELEASED: ${{ needs.release-please.outputs.viewer_released }}
          SERVER_NPM_RESULT: ${{ needs.publish-server.result }}
          VIEWER_NPM_RESULT: ${{ needs.publish-viewer.result }}
          MCPB_RESULT: ${{ needs.publish-mcpb.result }}
          GHCR_RESULT: ${{ needs.docker-publish-ghcr.result }}
          DOCKERHUB_RESULT: ${{ needs.docker-publish-dockerhub.result }}
        run: |
          set -euo pipefail
          require_success() {
            if [ "$2" != "success" ]; then
              echo "::error::$1 did not succeed (result: $2); keeping releases draft."
              exit 1
            fi
          }

          if [ "$SERVER_RELEASED" = "true" ]; then
            require_success "publish-server" "$SERVER_NPM_RESULT"
            require_success "publish-mcpb" "$MCPB_RESULT"
            require_success "docker-publish-ghcr" "$GHCR_RESULT"
            require_success "docker-publish-dockerhub" "$DOCKERHUB_RESULT"
          fi
          if [ "$VIEWER_RELEASED" = "true" ]; then
            require_success "publish-viewer" "$VIEWER_NPM_RESULT"
          fi

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Verify draft release assets and live registries
        env:
          GH_TOKEN: ${{ github.token }}
          SERVER_RELEASED: ${{ needs.release-please.outputs.server_released }}
          SERVER_TAG: ${{ needs.release-please.outputs.server_tag }}
          VIEWER_RELEASED: ${{ needs.release-please.outputs.viewer_released }}
          VIEWER_TAG: ${{ needs.release-please.outputs.viewer_tag }}
        run: |
          set -euo pipefail
          verify_release() {
            tag=$1
            shift
            draft=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')
            if [ "$draft" != "true" ] && [ "$GITHUB_RUN_ATTEMPT" = "1" ]; then
              echo "::error::Release $tag was published before finalization."
              exit 1
            fi
            assets=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')
            for asset in "$@"; do
              if ! printf '%s\n' "$assets" | grep -Fqx "$asset"; then
                echo "::error::Release $tag is missing $asset; keeping releases draft."
                exit 1
              fi
            done
          }
          verify_npm() {
            package=$1
            version=$2
            published=$(npm view "$package@$version" version)
            test "$published" = "$version"
            predicate=$(npm view "$package@$version" dist.attestations.provenance.predicateType)
            test "$predicate" = "https://slsa.dev/provenance/v1"
          }

          if [ "$SERVER_RELEASED" = "true" ]; then
            version=${SERVER_TAG#server-v}
            tarball="ambitresearch-genie-$version.tgz"
            verify_release "$SERVER_TAG" \
              "$tarball" "$tarball.sig" \
              genie-server-sbom.cdx.json genie-server-sbom.cdx.json.sig \
              genie.mcpb genie.mcpb.sig
            verify_npm @ambitresearch/genie "$version"
          fi
          if [ "$VIEWER_RELEASED" = "true" ]; then
            version=${VIEWER_TAG#viewer-v}
            tarball="ambitresearch-genie-viewer-$version.tgz"
            verify_release "$VIEWER_TAG" \
              "$tarball" "$tarball.sig" \
              genie-viewer-sbom.cdx.json genie-viewer-sbom.cdx.json.sig
            verify_npm @ambitresearch/genie-viewer "$version"
          fi

      - name: Publish verified component releases
        env:
          GH_TOKEN: ${{ github.token }}
          SERVER_RELEASED: ${{ needs.release-please.outputs.server_released }}
          SERVER_TAG: ${{ needs.release-please.outputs.server_tag }}
          VIEWER_RELEASED: ${{ needs.release-please.outputs.viewer_released }}
          VIEWER_TAG: ${{ needs.release-please.outputs.viewer_tag }}
        run: |
          set -euo pipefail
          publish_release() {
            tag=$1
            if [ "$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" = "true" ]; then
              gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false
            else
              echo "Release $tag is already published; verifying the retry."
            fi
          }

          if [ "$SERVER_RELEASED" = "true" ]; then publish_release "$SERVER_TAG"; fi
          if [ "$VIEWER_RELEASED" = "true" ]; then publish_release "$VIEWER_TAG"; fi

      - name: Verify finalized releases
        env:
          GH_TOKEN: ${{ github.token }}
          SERVER_RELEASED: ${{ needs.release-please.outputs.server_released }}
          SERVER_TAG: ${{ needs.release-please.outputs.server_tag }}
          VIEWER_RELEASED: ${{ needs.release-please.outputs.viewer_released }}
          VIEWER_TAG: ${{ needs.release-please.outputs.viewer_tag }}
        run: |
          set -euo pipefail
          verify_published() {
            test "$(gh release view "$1" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')" = "false"
          }
          if [ "$SERVER_RELEASED" = "true" ]; then verify_published "$SERVER_TAG"; fi
          if [ "$VIEWER_RELEASED" = "true" ]; then verify_published "$VIEWER_TAG"; fi

  # Manual recovery is deliberately separate from the normal Release Please
  # path. It is only for a release where npm and signed GitHub assets already
  # succeeded but one or both container registries did not. Running from main
  # preserves the documented keyless certificate identity; the guard refuses
  # mutable inputs other than an existing pair of draft component releases.
  recovery-guard:
    name: validate manual draft-release recovery
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Require main and matching draft component releases
        env:
          GH_TOKEN: ${{ github.token }}
          SERVER_TAG: ${{ github.event.inputs.server_tag }}
          VIEWER_TAG: ${{ github.event.inputs.viewer_tag }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Release recovery must be dispatched from refs/heads/main so the Cosign certificate identity remains stable."
            exit 1
          fi
          case "$SERVER_TAG" in
            server-v*) ;;
            *) echo "::error::Unexpected server release tag: $SERVER_TAG"; exit 1 ;;
          esac
          case "$VIEWER_TAG" in
            viewer-v*) ;;
            *) echo "::error::Unexpected viewer release tag: $VIEWER_TAG"; exit 1 ;;
          esac

          server_version=${SERVER_TAG#server-v}
          viewer_version=${VIEWER_TAG#viewer-v}
          server_latest=$(npm view @ambitresearch/genie dist-tags.latest)
          viewer_latest=$(npm view @ambitresearch/genie-viewer dist-tags.latest)
          if ! test "$server_latest" = "$server_version"; then
            echo "::error::Server recovery version $server_version is not npm latest ($server_latest); refusing to repoint registry latest tags."
            exit 1
          fi
          if ! test "$viewer_latest" = "$viewer_version"; then
            echo "::error::Viewer recovery version $viewer_version is not npm latest ($viewer_latest); refusing to repoint registry latest tags."
            exit 1
          fi

          verify_draft_release() {
            tag=$1
            draft=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')
            immutable=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isImmutable --jq '.isImmutable')
            if [ "$draft" != "true" ]; then
              echo "::error::Release $tag is not a draft; recovery cannot mutate a published release." >&2
              exit 1
            fi
            if [ "$immutable" != "false" ]; then
              echo "::error::Release $tag is immutable; recovery requires a mutable draft." >&2
              exit 1
            fi

            target=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json targetCommitish --jq '.targetCommitish')
            tag_sha=$(gh api "repos/$GITHUB_REPOSITORY/commits/$tag" --jq '.sha')
            target_sha=$(gh api "repos/$GITHUB_REPOSITORY/commits/$target" --jq '.sha')
            if [ "$tag_sha" != "$target_sha" ]; then
              echo "::error::Release $tag targets $target_sha, but its tag resolves to $tag_sha." >&2
              exit 1
            fi
            printf '%s' "$tag_sha"
          }

          server_sha=$(verify_draft_release "$SERVER_TAG")
          viewer_sha=$(verify_draft_release "$VIEWER_TAG")
          if [ "$server_sha" != "$viewer_sha" ]; then
            echo "::error::Recovery tags must be the component pair from one release commit ($server_sha != $viewer_sha)."
            exit 1
          fi
          echo "Validated mutable draft releases at $server_sha."

  recovery-docker-publish-ghcr:
    name: recover GHCR image (multi-arch, signed)
    needs: recovery-guard
    if: github.event_name == 'workflow_dispatch' && needs.recovery-guard.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.server_tag }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Derive recovery image tags
        id: tags
        env:
          SERVER_TAG: ${{ github.event.inputs.server_tag }}
        run: |
          set -euo pipefail
          case "$SERVER_TAG" in
            server-v*) version="${SERVER_TAG#server-v}" ;;
            *) echo "::error::Unexpected server release tag: $SERVER_TAG"; exit 1 ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "staging=recovery-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild and push staging multi-arch image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ghcr.io/ambitresearch/genie:${{ steps.tags.outputs.staging }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Sign and verify recovered GHCR digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          CERTIFICATE_IDENTITY: https://github.com/ambitresearch/genie/.github/workflows/release.yml@refs/heads/main
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
          SIGNING_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          image=ghcr.io/ambitresearch/genie
          cosign sign --yes "$image@$BUILD_DIGEST"
          cosign verify \
            --certificate-identity="$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer="$CERTIFICATE_OIDC_ISSUER" \
            --certificate-github-workflow-sha="$SIGNING_SHA" \
            "$image@$BUILD_DIGEST"

      - name: Verify recovered GHCR platforms
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect \
            "ghcr.io/ambitresearch/genie@$BUILD_DIGEST" --raw > manifest.json
          node <<'NODE'
          const manifest = JSON.parse(require("node:fs").readFileSync("manifest.json", "utf8"));
          const platforms = new Set(
            (manifest.manifests ?? []).map(({ platform = {} }) => `${platform.os}/${platform.architecture}`),
          );
          for (const required of ["linux/amd64", "linux/arm64"]) {
            if (!platforms.has(required)) throw new Error(`Missing required platform: ${required}`);
          }
          NODE

      - name: Promote verified GHCR recovery digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          image=ghcr.io/ambitresearch/genie
          docker buildx imagetools create \
            --tag "$image:$VERSION" \
            --tag "$image:latest" \
            --metadata-file promotion.json \
            "$image@$BUILD_DIGEST"
          promoted_digest=$(node -p 'JSON.parse(require("node:fs").readFileSync("promotion.json", "utf8"))["containerimage.descriptor"].digest')
          test "$promoted_digest" = "$BUILD_DIGEST"

      - name: Verify live GHCR recovery tags
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          for tag in "$VERSION" latest; do
            published_digest=$(docker buildx imagetools inspect \
              "ghcr.io/ambitresearch/genie:$tag" \
              | awk '$1 == "Digest:" { print $2; exit }')
            test "$published_digest" = "$BUILD_DIGEST"
          done

  recovery-docker-publish-dockerhub:
    name: recover Docker Hub image (multi-arch, signed)
    needs: recovery-guard
    if: github.event_name == 'workflow_dispatch' && needs.recovery-guard.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
