name: Release

on:
  pull_request:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      server_tag:
        description: Existing draft server release tag to recover (for example, server-v1.3.1)
        required: true
        type: string
      viewer_tag:
        description: Existing draft viewer release tag to verify and finalize (for example, viewer-v0.1.1)
        required: true
        type: string

# Default to read-only for every job (GitHub's recommended hardening —
# https://docs.github.com/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token).
# `publish-dry-run` runs install/build steps driven by PR-controlled source
# (package.json scripts, lockfile, etc.) on every `pull_request` event, so it
# must NOT inherit write access to contents/PRs. Only the `release-please`
# job (which needs to push a release PR + tags) is granted write permissions,
# scoped on that job itself below.
permissions:
  contents: read

# Normal production releases and manual recovery both mutate the version and
# latest registry tags. Keep those paths under one non-cancelling lock while
# allowing unrelated PR dry-runs to proceed independently.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('release-pr-{0}', github.event.pull_request.number) || 'release-production' }}
  cancel-in-progress: false

jobs:
  # ── Dry-run publish test (M5-06 DoD: "dry-run publish on a non-prod tag") ──
  # Runs on every PR and every successful main CI completion. It never writes
  # to the real registry (no registry-url/NODE_AUTH_TOKEN configured). Current
  # npm still checks public registry metadata during `--dry-run`, so the packed
  # manifest uses a unique CI-only prerelease version. The job exercises the
  # exact command shape (`--provenance --access public`) the real publish jobs run.
  publish-dry-run:
    name: publish dry-run (non-prod, ${{ matrix.package }})
    if: github.event_name == 'pull_request' || (github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ["@ambitresearch/genie", "@ambitresearch/genie-viewer"]
        include:
          - package: "@ambitresearch/genie"
            dir: packages/server
          - package: "@ambitresearch/genie-viewer"
            dir: packages/viewer
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # `workflow_run` otherwise checks out whichever commit is currently
          # at main, not necessarily the commit that completed CI.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Build ${{ matrix.package }}
        run: pnpm --filter ${{ matrix.package }} build

      - name: Generate CycloneDX SBOM (${{ matrix.package }})
        run: |
          node scripts/generate-package-sbom.mjs \
            "${{ matrix.dir }}" "$RUNNER_TEMP/package-sbom.cdx.json"

      - name: Smoke packaged CLI entry point
        working-directory: ${{ matrix.dir }}
        run: |
          set -euo pipefail
          BIN_NAME=$(node -p 'const p = require("./package.json"); typeof p.bin === "string" ? p.name.split("/").pop() : Object.keys(p.bin)[0]')
          BIN_TARGET=$(node -p 'const p = require("./package.json"); typeof p.bin === "string" ? p.bin : p.bin[Object.keys(p.bin)[0]]')
          PACKAGE_VERSION=$(node -p 'require("./package.json").version')
          expected="$PACKAGE_VERSION"
          if [ "$BIN_NAME" = "genie" ]; then
            expected="genie $PACKAGE_VERSION"
          fi

          tmp_dir=$(mktemp -d)
          trap 'rm -rf "$tmp_dir"' EXIT
          ln -s "$PWD/$BIN_TARGET" "$tmp_dir/$BIN_NAME"
          actual=$(node "$tmp_dir/$BIN_NAME" --version)
          if [ "$actual" != "$expected" ]; then
            echo "::error::$BIN_NAME --version returned '$actual'; expected '$expected'." >&2
            exit 1
          fi

      - name: npm publish --dry-run (${{ matrix.package }})
        working-directory: ${{ matrix.dir }}
        # No registry-url/NODE_AUTH_TOKEN is configured for this job, so the
        # dry run cannot write to the registry. npm still consults public
        # metadata and rejects an already-published version even in dry-run
        # mode. Rewrite only the ephemeral checkout's package version to a
        # unique prerelease before packing and pass an explicit non-production
        # dist-tag, which npm requires for prerelease versions. The real publish
        # path continues to use the release tag's version. Provenance attestation
        # itself is skipped in --dry-run mode; the live gate below separately
        # requires a public source repository.
        # Regression guard: npm's publish-time manifest normalization can
        # silently rewrite/strip fields (e.g. it removed a `./`-prefixed
        # `bin` target in the past — see DRO-278 review) while still
        # exiting 0. Capture output and fail closed on any "auto-corrected"
        # notice so a future manifest regression breaks CI instead of
        # publishing a corrected-but-unintended package.
        run: |
          set -euo pipefail
          tmp_dir=$(mktemp -d)
          trap 'rm -rf "$tmp_dir"' EXIT
          ci_version="0.0.0-ci.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          npm pkg set "version=$ci_version"
          npm pack --json --pack-destination "$tmp_dir" . \
            > "$tmp_dir/pack.json" \
            2> >(tee "$tmp_dir/pack-stderr.log" >&2)
          filename=$(node -p 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"))[0].filename' "$tmp_dir/pack.json")
          npm publish "$tmp_dir/$filename" --dry-run --provenance --access public --tag ci \
            2>&1 | tee "$tmp_dir/publish-dry-run.log"
          if grep -qi "auto-corrected" "$tmp_dir/pack-stderr.log" "$tmp_dir/publish-dry-run.log"; then
            echo "::error::npm reported package.json auto-corrections during publish --dry-run. This means the published manifest would differ from the source manifest (e.g. an invalid bin/script field was silently dropped). Fix the manifest so no auto-correction is needed." >&2
            exit 1
          fi

  release-please:
    needs: publish-dry-run
    if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      # release-please-action@v4 exposes one `releases_created`/`tag_name` pair
      # per configured package (`packages/server`, `packages/viewer`) via the
      # `--<path>--` output suffix documented in its README. Downstream jobs
      # below read these per-package flags rather than the aggregate output so
      # a server-only (or viewer-only) release doesn't publish the other
      # package with a stale/unbumped version.
      server_released: ${{ steps.release.outputs['packages/server--release_created'] }}
      server_tag: ${{ steps.release.outputs['packages/server--tag_name'] }}
      server_sha: ${{ steps.release.outputs['packages/server--sha'] }}
      viewer_released: ${{ steps.release.outputs['packages/viewer--release_created'] }}
      viewer_tag: ${{ steps.release.outputs['packages/viewer--tag_name'] }}
      viewer_sha: ${{ steps.release.outputs['packages/viewer--sha'] }}
      tested_sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Select the CI-tested release attempt
        id: head
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          current_sha=$(gh api "repos/${{ github.repository }}/commits/${DEFAULT_BRANCH}" --jq '.sha')
          pending_release_pr=$(gh api "repos/${{ github.repository }}/commits/${TESTED_SHA}/pulls" \
            --jq '[.[] | select(.merged_at != null and (.head.ref | startswith("release-please--")))][0].number // empty')

          if [ -n "$pending_release_pr" ]; then
            if [ "$current_sha" != "$TESTED_SHA" ]; then
              echo "::error::A newer main commit ($current_sha) arrived after CI completed for release commit $TESTED_SHA. Wait for the newer main CI completion before creating tags."
              exit 1
            fi
            visibility=$(gh api "repos/${{ github.repository }}" --jq '.visibility')
            if [ "$visibility" != "public" ]; then
              echo "::error::npm provenance requires a public source repository; ${GITHUB_REPOSITORY} is currently '$visibility'. Make the repository public, then rerun CI for $TESTED_SHA."
              exit 1
            fi
            if [ -z "$NPM_TOKEN" ]; then
              echo "::error::The NPM_TOKEN repository secret is not configured. Add a publish-scoped npm token, then rerun CI for $TESTED_SHA."
              exit 1
            fi
            if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
              echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must both be configured before creating a release. Add both repository secrets, then rerun CI for $TESTED_SHA."
              exit 1
            fi
            echo "create_release=true" >> "$GITHUB_OUTPUT"
            echo "update_pr=false" >> "$GITHUB_OUTPUT"
          elif [ "$current_sha" != "$TESTED_SHA" ]; then
            echo "A newer main commit ($current_sha) arrived after CI completed for $TESTED_SHA; its CI completion will update the release PR."
            echo "create_release=false" >> "$GITHUB_OUTPUT"
            echo "update_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "create_release=false" >> "$GITHUB_OUTPUT"
            echo "update_pr=true" >> "$GITHUB_OUTPUT"
          fi

      # These non-destructive probes catch missing/revoked credentials and npm
      # scope-membership mistakes. Registry write scopes cannot be proven
      # without mutating a package/image; the publish jobs remain authoritative.
      - name: Validate production registry authentication
        if: steps.head.outputs.create_release == 'true'
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npmrc=$(mktemp)
          docker_config=$(mktemp -d)
          trap 'rm -f "$npmrc"; rm -rf "$docker_config"' EXIT
          chmod 600 "$npmrc"
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$npmrc"

          npm_user=$(npm --userconfig "$npmrc" whoami --registry=https://registry.npmjs.org)
          org_members=$(npm --userconfig "$npmrc" org ls ambitresearch --json)
          ORG_MEMBERS="$org_members" NPM_USER="$npm_user" node -e '
            const members = JSON.parse(process.env.ORG_MEMBERS);
            const npmUser = process.env.NPM_USER;
            if (!members || Array.isArray(members) || !Object.hasOwn(members, npmUser)) {
              console.error(`npm user ${npmUser} is not a member of @ambitresearch`);
              process.exit(1);
            }
          '
          npm --userconfig "$npmrc" access list packages @ambitresearch --json >/dev/null
          printf '%s' "$DOCKERHUB_TOKEN" \
            | docker --config "$docker_config" login docker.io \
                --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Create the CI-gated GitHub release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        if: steps.head.outputs.create_release == 'true'
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

      - name: Open or update the release PR
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        if: steps.head.outputs.update_pr == 'true'
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  # The workflow starts only after CI completes successfully. Verify
  # release-please tagged that exact tested commit, then enforce npm's
  # release target before either production publish can run. Public-repository
  # provenance and npm-token prerequisites are checked before release-please
  # creates any GitHub release or tag, preserving a safe manual rerun path.
  verify-release:
    name: verify release SHA matches CI-tested commit
    needs: release-please
    if: needs.release-please.outputs.server_released == 'true' || needs.release-please.outputs.viewer_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify release target
        env:
          TESTED_SHA: ${{ needs.release-please.outputs.tested_sha }}
          SERVER_RELEASED: ${{ needs.release-please.outputs.server_released }}
          SERVER_SHA: ${{ needs.release-please.outputs.server_sha }}
          VIEWER_RELEASED: ${{ needs.release-please.outputs.viewer_released }}
          VIEWER_SHA: ${{ needs.release-please.outputs.viewer_sha }}
        run: |
          set -euo pipefail
          if [ "$SERVER_RELEASED" = "true" ] && [ "$SERVER_SHA" != "$TESTED_SHA" ]; then
            echo "::error::@ambitresearch/genie release targets $SERVER_SHA, but CI succeeded for $TESTED_SHA."
            exit 1
          fi
          if [ "$VIEWER_RELEASED" = "true" ] && [ "$VIEWER_SHA" != "$TESTED_SHA" ]; then
            echo "::error::@ambitresearch/genie-viewer release targets $VIEWER_SHA, but CI succeeded for $TESTED_SHA."
            exit 1
          fi

          echo "Release targets CI-tested commit $TESTED_SHA."

  # ── npm publish (DRO-278 / M5-06) ────────────────────────────────────────────
  # If one package fails after the release is created, use Actions' "Re-run
  # failed jobs" operation. It retains this successful job's outputs and only
  # retries the failed package path, avoiding a duplicate publish of its sibling.
  # Release Please component tags are
  # `server-vX.Y.Z` / `viewer-vX.Y.Z`
  # (`include-component-in-tag: true`), not a bare `v*`. Each publish job is
  # gated on release-please's own per-package `release_created` output.
  publish-server:
    name: publish @ambitresearch/genie (npm)
    needs: [publish-dry-run, release-please, verify-release]
    if: needs.release-please.outputs.server_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the SBOM asset to the server release
      id-token: write # OIDC — required for `--provenance` (AC2)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.release-please.outputs.server_tag }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Build @ambitresearch/genie
        run: pnpm --filter @ambitresearch/genie build

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p artifacts/server
          node scripts/generate-package-sbom.mjs \
            packages/server artifacts/server/genie-server-sbom.cdx.json

      - name: Pack the exact npm artifact
        id: artifact
        run: |
          set -euo pipefail
          npm pack --json --pack-destination artifacts/server ./packages/server \
            > artifacts/server/pack.json
          filename=$(node -p 'JSON.parse(require("node:fs").readFileSync("artifacts/server/pack.json", "utf8"))[0].filename')
          tarball="artifacts/server/$filename"
          test -f "$tarball"
          rm artifacts/server/pack.json
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Sign and verify npm artifact and SBOM
        env:
          TARBALL: ${{ steps.artifact.outputs.tarball }}
          SBOM: artifacts/server/genie-server-sbom.cdx.json
          CERTIFICATE_IDENTITY: https://github.com/ambitresearch/genie/.github/workflows/release.yml@refs/heads/main
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
          SIGNING_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for artifact in "$TARBALL" "$SBOM"; do
            cosign sign-blob --yes --bundle "$artifact.sig" "$artifact"
            cosign verify-blob --bundle "$artifact.sig" \
              --certificate-identity="$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer="$CERTIFICATE_OIDC_ISSUER" \
              --certificate-github-workflow-sha="$SIGNING_SHA" \
              "$artifact"
          done

      - name: Attach signed artifacts to the server release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.release-please.outputs.server_tag }}
          draft: true
          files: |
            artifacts/server/*.tgz
            artifacts/server/*.tgz.sig
            artifacts/server/*-sbom.cdx.json
            artifacts/server/*-sbom.cdx.json.sig

      - name: Publish @ambitresearch/genie (public, provenance)
        # AC3 — NODE_AUTH_TOKEN sourced from the NPM_TOKEN repo secret; npm's
        # own tooling reads this env var during `npm publish` when a registry
        # requires auth (set above via setup-node's registry-url).
        # AC4 — `publishConfig.access: public` in packages/server/package.json
        # publishes the scoped `@ambitresearch/genie` package publicly. Both
        # bare `genie` and the `@genie` scope belong to unrelated npm users;
        # the Ambit Research-owned fallback is recorded in M0-04 / CLAUDE.md.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TARBALL: ${{ steps.artifact.outputs.tarball }}
        run: npm publish "$TARBALL" --provenance --access public

  publish-viewer:
    name: publish @ambitresearch/genie-viewer (npm)
    needs: [publish-dry-run, release-please, verify-release]
    if: needs.release-please.outputs.viewer_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the SBOM asset to the viewer release
      id-token: write # OIDC — required for `--provenance` (AC2)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.release-please.outputs.viewer_tag }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Build @ambitresearch/genie-viewer
        run: pnpm --filter @ambitresearch/genie-viewer build

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p artifacts/viewer
          node scripts/generate-package-sbom.mjs \
            packages/viewer artifacts/viewer/genie-viewer-sbom.cdx.json

      - name: Pack the exact npm artifact
        id: artifact
        run: |
          set -euo pipefail
          npm pack --json --pack-destination artifacts/viewer ./packages/viewer \
            > artifacts/viewer/pack.json
          filename=$(node -p 'JSON.parse(require("node:fs").readFileSync("artifacts/viewer/pack.json", "utf8"))[0].filename')
          tarball="artifacts/viewer/$filename"
          test -f "$tarball"
          rm artifacts/viewer/pack.json
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Sign and verify npm artifact and SBOM
        env:
          TARBALL: ${{ steps.artifact.outputs.tarball }}
          SBOM: artifacts/viewer/genie-viewer-sbom.cdx.json
          CERTIFICATE_IDENTITY: https://github.com/ambitresearch/genie/.github/workflows/release.yml@refs/heads/main
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
          SIGNING_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for artifact in "$TARBALL" "$SBOM"; do
            cosign sign-blob --yes --bundle "$artifact.sig" "$artifact"
            cosign verify-blob --bundle "$artifact.sig" \
              --certificate-identity="$CERTIFICATE_IDENTITY" \
              --certificate-oidc-issuer="$CERTIFICATE_OIDC_ISSUER" \
              --certificate-github-workflow-sha="$SIGNING_SHA" \
              "$artifact"
          done

      - name: Attach signed artifacts to the viewer release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.release-please.outputs.viewer_tag }}
          draft: true
          files: |
            artifacts/viewer/*.tgz
            artifacts/viewer/*.tgz.sig
            artifacts/viewer/*-sbom.cdx.json
            artifacts/viewer/*-sbom.cdx.json.sig

      - name: Publish @ambitresearch/genie-viewer (public, provenance)
        # AC5 — `@ambitresearch/genie-viewer` publishes scoped + public via the same
        # publishConfig pattern as the server package above.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TARBALL: ${{ steps.artifact.outputs.tarball }}
        run: npm publish "$TARBALL" --provenance --access public

  # M5-05 / DRO-277 AC6 — attach the macOS Claude Desktop bundle to every
  # server GitHub Release. Build from the release tag so the bundle version
  # and server payload are byte-for-byte aligned with the released package.
  publish-mcpb:
    name: publish genie.mcpb (GitHub Release)
    needs: [publish-dry-run, release-please, verify-release]
    if: needs.release-please.outputs.server_released == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.release-please.outputs.server_tag }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Claude Desktop bundle
        run: pnpm bundle:mcpb

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Sign and verify Claude Desktop bundle
        env:
          CERTIFICATE_IDENTITY: https://github.com/ambitresearch/genie/.github/workflows/release.yml@refs/heads/main
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
          SIGNING_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cosign sign-blob --yes --bundle dist/genie.mcpb.sig dist/genie.mcpb
          cosign verify-blob --bundle dist/genie.mcpb.sig \
            --certificate-identity="$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer="$CERTIFICATE_OIDC_ISSUER" \
            --certificate-github-workflow-sha="$SIGNING_SHA" \
            dist/genie.mcpb

      - name: Attach signed bundle to the server release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.release-please.outputs.server_tag }}
          draft: true
          files: |
            dist/genie.mcpb
            dist/genie.mcpb.sig

  # M5-07 / DRO-279 — publish each registry in its own retryable job after the
  # pre-tag credential gate succeeds. Both jobs build amd64 + arm64 from the
  # CI-verified server release tag and sign that registry's digest with GitHub
  # OIDC (no stored signing key).
  docker-publish-ghcr:
    name: publish GHCR image (multi-arch, signed)
    needs: [publish-dry-run, release-please, verify-release]
    if: needs.release-please.outputs.server_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.release-please.outputs.server_tag }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Derive image version
        id: tags
        env:
          SERVER_TAG: ${{ needs.release-please.outputs.server_tag }}
        run: |
          set -euo pipefail
          case "$SERVER_TAG" in
            server-v*) version="${SERVER_TAG#server-v}" ;;
            *) echo "::error::Unexpected server release tag: $SERVER_TAG"; exit 1 ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "staging=staging-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push staging multi-arch image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Supply-chain (issue #207 / M6-04): attach an SPDX SBOM and a
          # max-detail SLSA provenance attestation to the pushed image so the
          # image manifest carries its own bill of materials + build metadata.
          sbom: true
          provenance: mode=max
          tags: ghcr.io/ambitresearch/genie:${{ steps.tags.outputs.staging }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.2

      - name: Sign GHCR image digest (keyless)
        run: cosign sign --yes "ghcr.io/ambitresearch/genie@${{ steps.build.outputs.digest }}"

      - name: Verify GHCR image signature
        env:
          CERTIFICATE_IDENTITY: https://github.com/ambitresearch/genie/.github/workflows/release.yml@refs/heads/main
          CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
          SIGNING_SHA: ${{ github.sha }}
        run: |
          cosign verify \
            --certificate-identity="$CERTIFICATE_IDENTITY" \
            --certificate-oidc-issuer="$CERTIFICATE_OIDC_ISSUER" \
            --certificate-github-workflow-sha="$SIGNING_SHA" \
            "ghcr.io/ambitresearch/genie@${{ steps.build.outputs.digest }}"

      - name: Promote verified GHCR digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          image=ghcr.io/ambitresearch/genie
          docker buildx imagetools create \
            --tag "$image:$VERSION" \
            --tag "$image:latest" \
            --metadata-file promotion.json \
            "$image@$BUILD_DIGEST"
          promoted_digest=$(node -p 'JSON.parse(require("node:fs").readFileSync("promotion.json", "utf8"))["containerimage.descriptor"].digest')
          test "$promoted_digest" = "$BUILD_DIGEST"

      - name: Verify promoted release tag
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ steps.tags.outputs.version }}
        run: |
          set -euo pipefail
          for tag in "$VERSION" latest; do
            published_digest=$(docker buildx imagetools inspect \
              "ghcr.io/ambitresearch/genie:$tag" \
              | awk '$1 == "Digest:" { print $2; exit }')
            test "$published_digest" = "$BUILD_DIGEST"
          done

  docker-publish-dockerhub:
    name: publish Docker Hub image (multi-arch, signed)
    needs: [publish-dry-run, release-please, verify-release]
    if: needs.release-please.outputs.server_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.release-please.outputs.server_tag }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Derive image version
