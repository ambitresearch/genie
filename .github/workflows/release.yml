          push: true
          # Supply-chain (issue #207 / M6-04): SBOM + max provenance attestation,
          # matching the GHCR image above.
          sbom: true
          provenance: mode=max
          tags: docker.io/ambitresearch/genie:${{ steps.tags.outputs.staging }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
