name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Dry-run publish test (M5-06 DoD: "dry-run publish on a non-prod tag") ──
  # Runs on every PR + push — never touches the real registry (no
  # registry-url/NODE_AUTH_TOKEN configured, and `--dry-run` never contacts
  # npm for the publish itself). Exercises the exact same command shape
  # (`--provenance --access public`) the real publish-* jobs below run, so a
  # broken package.json/publishConfig/files list is caught on every PR instead
  # of only discovered when a real release tries to publish.
  publish-dry-run:
    name: publish dry-run (non-prod, ${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ["@genie/server", "@genie/viewer"]
        include:
          - package: "@genie/server"
            dir: packages/server
          - package: "@genie/viewer"
            dir: packages/viewer
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Build ${{ matrix.package }}
        run: pnpm --filter ${{ matrix.package }} build

      - name: npm publish --dry-run (${{ matrix.package }})
        working-directory: ${{ matrix.dir }}
        # No registry-url/NODE_AUTH_TOKEN is configured for this job — the
        # dry run never authenticates against, or contacts, the real
        # registry for the publish step (npm still resolves metadata from
        # the default registry, which is fine unauthenticated). Provenance
        # attestation itself is skipped in --dry-run mode by npm, but the
        # flag combination is validated the same as a real publish.
        run: npm publish --dry-run --provenance --access public

  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      # release-please-action@v4 exposes one `releases_created`/`tag_name` pair
      # per configured package (`packages/server`, `packages/viewer`) via the
      # `--<path>--` output suffix documented in its README. Downstream jobs
      # below read these per-package flags rather than the aggregate output so
      # a server-only (or viewer-only) release doesn't publish the other
      # package with a stale/unbumped version.
      server_released: ${{ steps.release.outputs['packages/server--release_created'] }}
      server_tag: ${{ steps.release.outputs['packages/server--tag_name'] }}
      viewer_released: ${{ steps.release.outputs['packages/viewer--release_created'] }}
      viewer_tag: ${{ steps.release.outputs['packages/viewer--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── AC6: first-class M0-04 CI gate ──────────────────────────────────────────
  # release-please merging its release PR onto `main` implies that PR's CI ran
  # green, but it does NOT prove the `CI` workflow (ci.yml) has itself reported
  # `success` for the exact commit SHA release-please just tagged — e.g. a
  # branch-protection config change, an admin merge, or a re-tagged commit
  # could slip past that assumption. This job makes the gate explicit and
  # verifiable: this workflow is itself triggered by the same `push: main`
  # event ci.yml reacts to, so `github.sha` IS the commit release-please just
  # tagged. Both publish jobs `need` this job in addition to `release-please`.
  #
  # Implementation (post-review fix): rather than sampling individual
  # name-matched check-runs (which can go green piecemeal, or pass on a
  # partial/stale set if ci.yml's job names ever drift from the regex), this
  # queries the GitHub Actions *workflow run* API for the `CI` workflow
  # (ci.yml) filtered to this exact commit SHA and reads that whole run's own
  # top-level `conclusion` — the same signal branch protection uses. A run
  # only reaches `completed`/`success` once every job in ci.yml (lint,
  # typecheck, test, build, gitea, viewer a11y, viewer e2e, m2 canary) has
  # finished, so there is nothing left to partially match.
  #
  # ci.yml's own longest job ceiling is `timeout-minutes: 20` (the gitea
  # conformance job) with up to 2 node-version legs fanning out from the
  # matrix; this job's own poll budget (60 * 20s = 20 min) is sized with
  # headroom above that so a still-running CI run is never mistaken for a
  # missing one.
  verify-ci-green:
    name: verify M0-04 CI is green for the released commit
    needs: release-please
    if: needs.release-please.outputs.server_released == 'true' || needs.release-please.outputs.viewer_released == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      actions: read
      checks: read
    steps:
      - name: Poll CI workflow run conclusion for github.sha
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          echo "Checking CI workflow run conclusion for $SHA ..."
          # Poll: the CI workflow run for this SHA may still be finishing
          # (both workflows react to the same push event, so ordering between
          # them isn't guaranteed). Fail closed after the timeout rather than
          # assume success. Budget: 60 * 20s = 20 min, comfortably above
          # ci.yml's own longest job's 20-minute timeout-minutes ceiling.
          for i in $(seq 1 60); do
            run_json=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=1" \
              --jq '.workflow_runs[0] // empty')

            if [ -z "$run_json" ]; then
              echo "No CI workflow run found yet for $SHA (attempt $i/60) ..."
              sleep 20
              continue
            fi

            status=$(echo "$run_json" | jq -r '.status')
            conclusion=$(echo "$run_json" | jq -r '.conclusion // "null"')

            if [ "$status" != "completed" ]; then
              echo "CI workflow run for $SHA is still '$status' (attempt $i/60) ..."
              sleep 20
              continue
            fi

            if [ "$conclusion" = "success" ]; then
              echo "CI workflow run for $SHA completed with conclusion=success."
              exit 0
            fi

            echo "::error::CI workflow run for $SHA completed with conclusion=${conclusion} — blocking npm publish (AC6)."
            exit 1
          done

          echo "::error::Timed out after 20m waiting for the CI workflow run on $SHA — blocking npm publish (AC6)."
          exit 1

  # ── npm publish (DRO-278 / M5-06) ────────────────────────────────────────────
  # AC1 (reconciled — see docs/github/issues/M5-06-npm-publish.md): tags are
  # `packages/server-vX.Y.Z` / `packages/viewer-vX.Y.Z`
  # (`include-component-in-tag: true`), not a bare `v*`; gating each publish
  # job on release-please's own `release_created` output is the mechanism
  # release-please's docs recommend in place of a separate
  # `on: push: tags: v*` trigger, which races the tag-creation step.
  publish-server:
    name: publish @genie/server (npm)
    needs: [release-please, verify-ci-green]
    if: needs.release-please.outputs.server_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — required for `--provenance` (AC2)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.server_tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Build @genie/server
        run: pnpm --filter @genie/server build

      - name: Publish @genie/server (public, provenance)
        working-directory: packages/server
        # AC3 — NODE_AUTH_TOKEN sourced from the NPM_TOKEN repo secret; npm's
        # own tooling reads this env var during `npm publish` when a registry
        # requires auth (set above via setup-node's registry-url).
        # AC4 — `publishConfig.access: public` in packages/server/package.json
        # publishes the scoped `@genie/server` package publicly (the root
        # `genie` name is already registered by an unrelated npm package —
        # documented fallback recorded on M0-04 / CLAUDE.md).
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

  publish-viewer:
    name: publish @genie/viewer (npm)
    needs: [release-please, verify-ci-green]
    if: needs.release-please.outputs.viewer_released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — required for `--provenance` (AC2)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.viewer_tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Build @genie/viewer
        run: pnpm --filter @genie/viewer build

      - name: Publish @genie/viewer (public, provenance)
        working-directory: packages/viewer
        # AC5 — `@genie/viewer` publishes scoped + public via the same
        # publishConfig pattern as the server package above.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
