name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.task }} (node ${{ matrix.node }}, ${{ matrix.os }})
    # On the ubuntu leg, honor the RUNS_ON repo variable (set by runner-guard.yml)
    # so CI offloads to the self-hosted TrueNAS runner near the monthly quota; a
    # value like `["self-hosted"]` re-parses as a one-label runner array. The macOS
    # leg always stays on GitHub-hosted macos-latest (no self-hosted macOS runner).
    runs-on: ${{ matrix.os == 'ubuntu-latest' && fromJSON(vars.RUNS_ON || '["ubuntu-latest"]') || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        os: [ubuntu-latest, macos-latest]
        task: [lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json "packageManager" (pnpm@10.34.4).
        # Do not also set `version:` here — action-setup@v4 rejects the conflict.

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: pnpm ${{ matrix.task }}

      - name: Upload build artifact
        if: matrix.task == 'build'
        uses: actions/upload-artifact@v4
        with:
          name: server-dist-${{ matrix.node }}-${{ matrix.os }}
          path: packages/server/dist
          if-no-files-found: error
          retention-days: 7
