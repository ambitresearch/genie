name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.task }} (node ${{ matrix.node }})
    # Honor the RUNS_ON repo variable (set by runner-guard.yml) so CI offloads to
    # the self-hosted TrueNAS runner near the monthly quota; `["self-hosted"]`.
    runs-on: ${{ fromJSON(vars.RUNS_ON || '["ubuntu-latest"]') }}
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
        task: [lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version is read from package.json "packageManager" (pnpm@10.34.4).
        # Do not also set `version:` here — action-setup@v4 rejects the conflict.

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        # Retry with a hardlink import fallback to ride out ERR_PNPM_EAGAIN — a
        # transient `copyfile` race in pnpm's store hydration seen on the
        # self-hosted runner, made likelier by the ~100 packages testcontainers
        # pulls in (M1-14a). `--package-import-method=hardlink` avoids the
        # copyfile path entirely; the retry covers any residual flake.
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Run ${{ matrix.task }}
        # VITEST_JUNIT makes vitest.config.ts add the `junit` reporter and write
        # reports/junit.xml (M1-14 AC8). Harmless for the non-test matrix legs.
        # GENIE_SKIP_DOCKER_TESTS forces the Gitea conformance walk to auto-skip
        # on this fast matrix even though GitHub runners ship a Docker daemon —
        # the container-backed path is owned by the dedicated `gitea` job below,
        # so the LocalFs path here stays fast (< 60 s, M1-14a AC5) and doesn't
        # boot Gitea once per node version.
        env:
          VITEST_JUNIT: "1"
          GENIE_SKIP_DOCKER_TESTS: "1"
        run: pnpm ${{ matrix.task }}

      - name: Upload build artifact
        if: matrix.task == 'build'
        uses: actions/upload-artifact@v4
        with:
          name: server-dist-${{ matrix.node }}
          path: packages/server/dist
          if-no-files-found: error
          retention-days: 7

      # AC8 — archive the M1 conformance (and full suite) JUnit report as a CI
      # artefact. Runs even when the suite fails so a red run still ships its
      # report for triage. `warn` (not `error`) on a missing report so a crash
      # before the reporter flushes surfaces the real test failure rather than a
      # secondary upload error that masks it.
      - name: Upload test report
        if: matrix.task == 'test' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-node-${{ matrix.node }}
          path: reports/junit.xml
          if-no-files-found: warn
          retention-days: 7

  # ── Docker-enabled Gitea conformance leg (M1-14a AC5 / DRO-532) ──────────────
  # The container-backed half of the conformance suite. Kept as a SEPARATE job
  # (not folded into the `check` matrix) for two reasons:
  #   1. It boots a real `gitea/gitea` container via testcontainers, so it needs
  #      a Docker daemon and runs longer than the < 60 s LocalFs walk. M1-14a AC5
  #      explicitly permits the Gitea path to be its own, longer job.
  #   2. It is pinned to GitHub-hosted `ubuntu-latest` (which guarantees a Docker
  #      daemon) rather than honoring the RUNS_ON offload var — the self-hosted
  #      runner makes no Docker guarantee, and a daemon-less runner would make
  #      this leg skip vacuously.
  gitea:
    name: gitea conformance (docker)
    runs-on: ubuntu-latest
    # Image pull + DB migration + the walk; generous ceiling well under any
    # matrix leg's concurrency budget.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # Same ERR_PNPM_EAGAIN hardlink-fallback retry as the matrix legs above.
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Run Gitea conformance walk
        # GENIE_REQUIRE_DOCKER makes the suite FAIL (not skip) if no daemon is
        # reachable, so a misconfigured runner can't turn this leg green-but-
        # vacuous. VITEST_JUNIT emits reports/junit.xml (same reporter the
        # LocalFs leg uses). The two positional filters run BOTH container-backed
        # halves of AC5:
        #   - gitea-conformance     — the store-layer walk (GitHostKitStore /
        #     GitHostProjectStore contract against a real Gitea).
        #   - m1-conformance        — its AC5 block, the MCP-tool-surface walk
        #     driven through createServer({ kitStore: GitHostKitStore }) (the
        #     DRO-523 store-injection seam). Its LocalFs tests re-run here too,
        #     but they are single-digit-ms, so the cost is the Gitea boot only.
        env:
          VITEST_JUNIT: "1"
          GENIE_REQUIRE_DOCKER: "1"
        run: pnpm test gitea-conformance m1-conformance

      # AC5/AC8 — archive the Gitea walk's JUnit report ALONGSIDE the LocalFs
      # `test-report-node-*` artefacts. Distinct name so both are downloadable
      # from the same run. `!cancelled()` so a red walk still ships its report.
      - name: Upload Gitea test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report-gitea
          path: reports/junit.xml
          if-no-files-found: warn
          retention-days: 7

  # ── Viewer accessibility audit (M4-09 / DRO-271) ─────────────────────────────
  # `packages/viewer/test/a11y.test.ts` — real headless Chromium + axe-core
  # against the actual static/{index.html,viewer.js,viewer.css} shell. Kept as
  # its own job (not folded into the `check` matrix) for the same reason as
  # `gitea` above: it needs a real browser binary, which the fast matrix legs
  # deliberately do not install (the suite's own GENIE_SKIP_A11Y_TESTS-free
  # self-probe — see the test file header — already makes it skip cleanly
  # there rather than fail). GENIE_REQUIRE_A11Y_BROWSER=1 below makes THIS job
  # fail loudly instead of silently skipping if its own browser install ever
  # breaks — the same "vacuous skip must fail somewhere" contract
  # GENIE_REQUIRE_DOCKER/GENIE_REQUIRE_LLM already give the Gitea/M2 legs.
  # Runs on every PR (unlike the Docker/LLM legs) — it needs neither a daemon
  # nor paid API access, so there is no reason to gate it to push-only.
  viewer-a11y:
    name: viewer accessibility audit (axe-core)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # Same ERR_PNPM_EAGAIN hardlink-fallback retry as the other jobs.
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Install Playwright Chromium
        # --with-deps pulls the OS package closure (libglib/libnss/fontconfig
        # etc.) ubuntu-latest doesn't ship by default — the exact gap this
        # suite's own doc comment works around with a private lib root when
        # run in a sandboxed dev workspace; a real CI runner just apt-gets it.
        run: pnpm --filter @genie/viewer exec playwright install --with-deps chromium

      - name: Run viewer accessibility audit (AC1-AC7)
        env:
          VITEST_JUNIT: "1"
          GENIE_REQUIRE_A11Y_BROWSER: "1"
        run: pnpm --filter @genie/viewer test:a11y

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report-viewer-a11y
          path: reports/junit.xml
          if-no-files-found: warn
          retention-days: 7

  # ── M2 real-LLM-endpoint canary (M2-09 / DRO-256) ────────────────────────────
  # `packages/e2e/test/m2-generation.test.ts` — the ONE test in the whole suite
  # that spends real dollars against a real model. Kept as its own job, gated
  # to `push` on `main` only (never `pull_request`), for exactly the reason the
  # issue names: keep every PR run free and fast, and only canary the full
  # generation pipeline against a live endpoint once code has already landed.
  #
  # `if: github.event_name == 'push'` is a belt-and-suspenders gate ON TOP OF
  # the test's own AC2 skip (`GENIE_LLM_BASE_URL` or `GENIE_LLM_API_KEY` unset
  # ⇒ every test in the file skips, exit 0 — both are required, not just the
  # API key: a partial configuration must still skip cleanly rather than throw
  # MissingLLMConfigError uncaught, Copilot review on PR #136) — even if this
  # workflow were ever triggered a different way, the job still only runs the
  # spend-real-money suite on a push to main, and even then only if the repo
  # secrets below are actually configured.
  m2-generation:
    name: m2 generation canary (real LLM endpoint)
    if: github.event_name == 'push'
    # Pin to the operator's self-hosted `genie` runner (currently the truenas
    # 7950X) because the GENIE_LLM_BASE_URL LiteLLM gateway lives on the
    # operator's private LAN and is not reachable from GitHub-hosted runner IP
    # ranges — the ubuntu-latest attempts (CI runs 28685084411, 28686644130)
    # each timed out at ~11-13 s / connect, uniformly across 4 retries. The
    # operator confirmed on DRO-655 (2026-07-03 23:36 Z): "we need to use our
    # own self hosted runner for e2e or any other workflows that depend on our
    # internal resources which are not accessible over internet". The `genie`
    # label narrows to that specific TrueNAS runner rather than the shared
    # Azure `azure-docker` one, which sits outside the same private network.
    runs-on: [self-hosted, Linux, X64, genie]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # Same ERR_PNPM_EAGAIN hardlink-fallback retry as the other jobs.
        run: |
          pnpm install --frozen-lockfile \
            || pnpm install --frozen-lockfile --package-import-method=hardlink \
            || pnpm install --frozen-lockfile --package-import-method=hardlink

      - name: Run M2 generation e2e (AC2 — skips if secrets are unset)
        # GENIE_LLM_BASE_URL / GENIE_LLM_API_KEY come from repo secrets (never
        # hardcoded — CLAUDE.md hard rule 5 / AGENTS.md hard rule 4). Until an
        # operator provisions them, `m2-generation.test.ts`'s own AC2 gate
        # skips the whole file and this step exits 0 — a green-but-vacuous run
        # is expected and visible in the job log, not a silent no-op.
        #
        # GENIE_REQUIRE_LLM flips this from "may vacuously skip" to "must run
        # for real" (Copilot review, PR #136 — the same contract
        # GENIE_REQUIRE_DOCKER already gives the Gitea conformance legs). It is
        # NOT hardcoded to "1": unlike the Docker leg (pinned to ubuntu-latest,
        # which guarantees a daemon), there is no guarantee these two repo
        # secrets are provisioned yet, and the issue's own AC2 requires this
        # suite to skip cleanly — not fail the push-to-main job — while they
        # aren't. The `github.secrets` context isn't queryable in an `if:`
        # expression, so this step-local shell check (both values already
        # resolved into env below) sets GENIE_REQUIRE_LLM=1 only once BOTH are
        # actually non-empty — guarding against exactly the regression Copilot
        # flagged (a previously-working secret rotated to empty/removed) without
        # making today's not-yet-provisioned state fail loudly.
        env:
          VITEST_JUNIT: "1"
          GENIE_LLM_BASE_URL: ${{ secrets.GENIE_LLM_BASE_URL }}
          GENIE_LLM_API_KEY: ${{ secrets.GENIE_LLM_API_KEY }}
        run: |
          if [ -n "$GENIE_LLM_BASE_URL" ] && [ -n "$GENIE_LLM_API_KEY" ]; then
            export GENIE_REQUIRE_LLM=1
          fi
          pnpm test m2-generation

      # AC7 — the per-component `.html` samples + summary.json this suite
      # writes to reports/m2-generation/ (empty/absent when AC2 skipped the
      # run — `if-no-files-found: warn`, not `error`, so that's not a failure).
      - name: Upload M2 generation samples
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: m2-generation-samples
          path: reports/m2-generation
          if-no-files-found: warn
          retention-days: 7

      - name: Upload M2 generation test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report-m2-generation
          path: reports/junit.xml
          if-no-files-found: warn
          retention-days: 7
