name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['packages/server--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/server--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Publish each registry independently so missing Docker Hub credentials cannot
  # block the built-in-token GHCR path. Both jobs build amd64 + arm64 and sign the
  # resulting registry-specific digest with keyless cosign (AC5/AC7).
  docker-publish-ghcr:
    name: GHCR image (multi-arch, signed)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless signing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tags
        id: tags
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          version="${tag#server-v}"
          version="${version#v}"
          {
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/roshangautam/genie:${{ steps.tags.outputs.version }}
            ghcr.io/roshangautam/genie:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image digests (keyless)
        # cosign discovers its OIDC identity from the GitHub Actions runner
        # token — no signing key or secret is ever stored in the repo
        # (CLAUDE.md hard rule 5).
        run: cosign sign --yes "ghcr.io/roshangautam/genie@${{ steps.build.outputs.digest }}"

  docker-publish-dockerhub:
    name: Docker Hub image (multi-arch, signed)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for cosign keyless signing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tags
        id: tags
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          version="${tag#server-v}"
          version="${version#v}"
          {
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/roshangautam/genie:${{ steps.tags.outputs.version }}
            docker.io/roshangautam/genie:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image digest (keyless)
        run: cosign sign --yes "docker.io/roshangautam/genie@${{ steps.build.outputs.digest }}"
