name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # This repo uses a manifest/path-keyed release-please config (packages
      # keyed by `packages/server`), so the action prefixes each package's
      # outputs with `<path>--`. The bare `release_created`/`tag_name` outputs
      # are empty here — use the path-scoped names (matches the M5-06 npm
      # publish workflow, DRO-278).
      server_release_created: ${{ steps.release.outputs['packages/server--release_created'] }}
      server_tag_name: ${{ steps.release.outputs['packages/server--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # M5-05 / DRO-277 AC6 — attach dist/genie.mcpb (the Claude Desktop
  # double-click installer) to every GitHub Release release-please cuts.
  # Only runs when release-please actually created a release on this push
  # (most pushes just update the pending release PR and produce nothing to
  # attach yet).
  publish-mcpb:
    needs: release-please
    if: ${{ needs.release-please.outputs.server_release_created == 'true' }}
    # The v1 manifest supports macOS only, and esbuild's production dependency
    # is platform-specific. Build on macOS so the archive ships a Darwin binary.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm bundle:mcpb
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.server_tag_name }}
          files: dist/genie.mcpb
