name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['packages/server--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/server--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Multi-arch Docker image (M5-07 / DRO-279) ────────────────────────────────
  # Builds + publishes ghcr.io/roshangautam/genie and docker.io/roshangautam/genie
  # for linux/amd64 + linux/arm64 on every release-please release, then signs
  # both digests with keyless cosign (AC5/AC7). Skipped entirely on ordinary
  # pushes that don't cut a release (release_created is unset/false).
  docker-publish:
    name: docker image (multi-arch, signed)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for cosign keyless signing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tags
        id: tags
        run: |
          tag="${{ needs.release-please.outputs.tag_name }}"
          version="${tag#server-v}"
          version="${version#v}"
          {
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/roshangautam/genie:${{ steps.tags.outputs.version }}
            docker.io/roshangautam/genie:latest
            ghcr.io/roshangautam/genie:${{ steps.tags.outputs.version }}
            ghcr.io/roshangautam/genie:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image digests (keyless)
        # cosign discovers its OIDC identity from the GitHub Actions runner
        # token — no signing key or secret is ever stored in the repo
        # (CLAUDE.md hard rule 5).
        run: |
          cosign sign --yes "docker.io/roshangautam/genie@${{ steps.build.outputs.digest }}"
          cosign sign --yes "ghcr.io/roshangautam/genie@${{ steps.build.outputs.digest }}"
